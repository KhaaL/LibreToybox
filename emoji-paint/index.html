<!DOCTYPE html>
<!-- LibreToybox — Emoji Paint · Licensed under the GNU GPL v3.0; see ../LICENSE -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emoji Paint</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌟</text></svg>" />
  <link rel="manifest" id="manifest-link" href="data:application/json,%7B%7D" />
  <meta name="theme-color" content="#DE7590" />
  <style>
    :root {
      --bg1: #FFF3F6;
      --bg2: #FFDCE6;
      --accent: #DE7590;
      --border: #F3C3D1;
      --text: #5C3347;
      --shadow: #E3A9BC;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    /* Own background on html stops the body gradient propagating to the
       canvas, where it would tile — rubber-band overscroll then shows the
       wrong end of the gradient instead of blending with the page. */
    html { background: var(--bg1); }
    body {
      font-family: ui-rounded, 'Hiragino Maru Gothic ProN', Quicksand, Comfortaa, 'Arial Rounded MT Bold', 'Varela Round', Calibri, sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100%;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    header {
      width: 100%;
      align-self: center;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 6px;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .logo { display: flex; align-items: center; }
    .top-btns { display: flex; gap: 8px; }
    .top-btn {
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 3px 0 var(--shadow);
      transition: transform .05s, box-shadow .05s;
      min-width: 48px;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: inherit;
    }
    .top-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--shadow); }

    main {
      width: 100%;
      align-self: center;
      flex: 1;
      padding: 2px 12px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-height: 0;
    }

    /* Visually hidden but available to screen readers (aria-live announcements
       still fire). Standard clip-based sr-only pattern. */
    #status { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); clip-path: inset(50%); white-space: nowrap; border: 0; }

    /* The canvas always fills the available viewport (minus the small margin
       from main's padding), in any rotation — no aspect cap, no width cap. */
    #canvas-wrap {
      position: relative;
      width: 100%;
      flex: 1;
      min-height: 0;
      background: #fff;
      border: 3px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.13);
      overflow: hidden;
    }

    #drawing-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
      display: block;
    }

    #toolbar {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Wraps so the ≥64 px controls (design principle 4) never overflow narrow phones. */
    #tool-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
    }

    .stamp-btn {
      width: 64px;
      height: 64px;
      border: 3px solid var(--border);
      border-radius: 12px;
      background: #fff;
      font-size: 2rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 0 var(--shadow);
      transition: transform .05s;
    }
    .stamp-btn:active { transform: translateY(2px); }

    .action-btn {
      width: 64px;
      height: 64px;
      border: 3px solid var(--border);
      border-radius: 12px;
      background: #fff;
      font-family: inherit;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 0 var(--shadow);
      transition: transform .05s;
    }
    .action-btn:active { transform: translateY(2px); }
    /* Reddish highlight while the trash tool is armed, or while a lifted
       stamp is being dragged over it — distinct from the game's normal pink
       accent, so "this will delete" reads as a deliberate, different state. */
    #trash-btn.active { border-color: #E53935; background: #FFEBEE; }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      text-align: center;
      padding: 24px;
    }
    .overlay.show { display: flex; }

    /* Translucent white like every other game's overlay */
    #picker-overlay { background: rgba(255,255,255,0.92); }

    /* Emoji stamp picker — a big scrollable grid the child can sift through */
    .picker-card {
      width: min(94vw, 460px);
      height: min(82vh, 640px);
      background: #fff;
      border: 3px solid var(--border);
      border-radius: 20px;
      padding: 18px 16px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .picker-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .picker-header h2 { margin: 0; font-size: 1.4rem; }
    /* Horizontally-scrolling jump chips — one per category (+ Recent, once
       there's history) — so the child can skip straight to a section
       instead of scrolling past everything to get there. */
    .picker-nav {
      width: 100%;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      flex-shrink: 0;
      padding-bottom: 2px;
    }
    .nav-chip {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: #fff;
      font-size: 1.4rem;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .05s, border-color .1s, background .1s;
    }
    .nav-chip.active { border-color: var(--accent); background: #FFE4EC; }
    .nav-chip:active { transform: scale(0.9); }
    .nav-chip.hidden { display: none; }
    .picker-category.empty { display: none; }
    .picker-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-right: 2px;
    }
    .picker-category { display: flex; flex-direction: column; gap: 8px; }
    /* A discreet divider instead of a text label — the nav chips already
       carry each category's identity, and the emoji themselves make each
       section self-evident without needing to be read. */
    .picker-divider {
      align-self: stretch;
      height: 1px;
      background: var(--border);
      opacity: 0.7;
      flex-shrink: 0;
    }
    .picker-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    /* Recent stays a single scrollable row instead of wrapping — it's a
       quick-access strip, not a browsable category. */
    .recent-grid {
      flex-wrap: nowrap;
      overflow-x: auto;
      justify-content: flex-start;
      padding-bottom: 4px;
    }
    .recent-grid .emoji-opt { flex-shrink: 0; }
    .emoji-opt {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      border: 2px solid transparent;
      background: var(--bg1);
      font-size: 1.8rem;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .05s, border-color .1s, background .1s;
    }
    .emoji-opt.active { border-color: var(--accent); background: #FFE4EC; transform: scale(1.08); }
    .emoji-opt:active { transform: scale(0.9); }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a class="top-btn" id="back-btn" href="../index.html" aria-label="Back to LibreToybox home">🏠</a>
    <div class="logo" role="img" aria-label="Emoji Paint" title="Emoji Paint">
      <svg viewBox="0 0 48 48" width="40" height="40" aria-hidden="true">
        <rect x="4" y="6" width="40" height="36" rx="6" fill="#fff" stroke="#DE7590" stroke-width="2.5" transform="rotate(-4 24 24)"/>
        <text x="24" y="31" text-anchor="middle" font-size="22" transform="rotate(-4 24 24)">🌟</text>
      </svg>
    </div>
  </div>
  <div class="top-btns">
    <button class="top-btn" id="new-game" aria-label="New Painting">🔄</button>
  </div>
</header>

<main>
  <div id="status" aria-live="polite"></div>
  <div id="canvas-wrap">
    <canvas id="drawing-canvas"></canvas>
  </div>
  <div id="toolbar">
    <div id="tool-row">
      <button class="stamp-btn" id="stamp-btn" aria-label="Choose emoji stamp">🌟</button>
      <button class="action-btn" id="trash-btn" aria-label="Trash">🗑️</button>
      <button class="action-btn" id="save-btn" aria-label="Save painting">💾</button>
    </div>
  </div>
</main>

<div class="overlay" id="picker-overlay" role="dialog" aria-modal="true" aria-label="Choose an emoji stamp">
  <div class="picker-card">
    <div class="picker-header">
      <h2>Pick a Stamp</h2>
      <button class="top-btn" id="close-picker" aria-label="Close stamp picker">✕</button>
    </div>
    <div class="picker-nav" id="picker-nav" role="group" aria-label="Jump to category"></div>
    <div class="picker-scroll" id="picker-scroll"></div>
  </div>
</div>

<script>
const EMOJI_CATEGORIES = [
  { label: '😀 Faces', emojis: '😀 😃 😄 😁 😆 😅 🤣 😂 🙂 🙃 😉 😊 😇 🥰 😍 🤩 😘 😋 😜 🤪 🤑 🤗 🤔 😐 😏 🙄 😴 🤤 😷 🤒 🤢 🥵 🥶 😵 🤯 🥳 😎 🤓 🧐 😢 😭 😡 👻'.split(' ') },
  { label: '🐶 Animals', emojis: '🐶 🐱 🐭 🐹 🐰 🦊 🐻 🐼 🐨 🐯 🦁 🐮 🐷 🐸 🐵 🙈 🙉 🙊 🐔 🐧 🐦 🐤 🐥 🦆 🦉 🦇 🐺 🐗 🐴 🦄 🐝 🐛 🦋 🐌 🐞 🐢 🐍 🦎 🐙 🦑 🦀 🐠 🐟 🐬 🐳 🐋 🦈 🐊 🐅 🐆 🦓 🐘 🦒 🐫'.split(' ') },
  { label: '🍎 Food', emojis: '🍏 🍎 🍊 🍋 🍌 🍉 🍇 🍓 🍒 🍑 🥭 🍍 🥥 🥝 🍅 🥑 🌽 🥕 🥐 🍞 🧀 🥚 🍳 🥞 🥓 🍗 🌭 🍔 🍟 🍕 🌮 🌯 🥗 🍝 🍜 🍣 🍱 🍙 🍦 🍩 🍪 🎂 🍰 🍫 🍭 🍬 🍿 🍯'.split(' ') },
  { label: '🌈 Nature & Sky', emojis: '🌸 🌹 🌻 🌼 🌷 🌱 🌲 🌳 🌴 🌵 🍀 🍁 🍂 🍃 🍄 🌊 💧 ☔ 🌈 ☀️ ⛅ ☁️ 🌧️ ⛈️ ❄️ ☃️ 🌙 🌟 ⭐ 🌠 ⚡ 🔥 ✨ 🌕 🌛 🐚 🪐 ☄️ 🌫️ 💦'.split(' ') },
  { label: '⚽ Activities', emojis: '⚽ 🏀 🏈 ⚾ 🎾 🏐 🏓 🏸 🏒 🥊 🥋 🎣 🏹 🎿 🏂 🛹 🎨 🎭 🎪 🎬 🎤 🎧 🎼 🎹 🥁 🎸 🎻 🎲 🎯 🎳 🎮 🎈 🎉 🎊 🏆 🥇'.split(' ') },
  { label: '🚀 Travel', emojis: '🚗 🚕 🚙 🚌 🚓 🚑 🚒 🚚 🏍️ 🚲 🛴 🚂 🚆 ✈️ 🚀 🛸 🚁 ⛵ 🚤 🚢 ⚓ 🗺️ 🗽 🏰 🎡 🎢 🎠 ⛲ 🏖️ 🏝️ 🌋 🏔️ ⛰️ 🏠 🏡 🏫 🏥 🕌 🌉 🚦'.split(' ') },
  { label: '🎁 Objects', emojis: '⌚ 📱 💻 📷 📺 🔦 🕯️ 💡 🔑 🔒 📚 📖 ✏️ 🖍️ 🎀 👑 💍 💎 🧸 🪀 🪁 🎁 🧩 🪄 🔋 🛍️ 👓 🎒 🧦 👟 👗 👒 🧢 🌂 ⏰ 🧴'.split(' ') },
  { label: '❤️ Hearts & Symbols', emojis: '❤️ 🧡 💛 💚 💙 💜 🖤 🤍 🤎 💔 💕 💞 💓 💗 💖 💘 💝 💠 ☮️ ♥️ 💯 🔔 🔯 🕉️'.split(' ') }
];

// --- Shared modal a11y helper (copied into each game — the suite ships no
// bundler). Moves focus into an opened overlay, traps Tab within it, closes on
// Escape, and restores focus to the opener on close (design principle 8). ---
const Modal = {
  opener: null, overlay: null, onDismiss: null, handler: null,
  focusable(el) {
    return [...el.querySelectorAll('a[href], button:not([disabled]), input, select, textarea, [tabindex]:not([tabindex="-1"])')]
      .filter(n => n.getClientRects().length > 0);
  },
  open(overlay, onDismiss) {
    this.opener = document.activeElement;
    this.overlay = overlay;
    this.onDismiss = onDismiss || null;
    const items = this.focusable(overlay);
    (items[0] || overlay).focus({ preventScroll: true });
    this.handler = (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        if (this.onDismiss) this.onDismiss(); else this.close();
      } else if (e.key === 'Tab') {
        const f = this.focusable(overlay);
        if (!f.length) { e.preventDefault(); return; }
        const first = f[0], last = f[f.length - 1];
        if (e.shiftKey && (document.activeElement === first || !overlay.contains(document.activeElement))) {
          e.preventDefault(); last.focus();
        } else if (!e.shiftKey && (document.activeElement === last || !overlay.contains(document.activeElement))) {
          e.preventDefault(); first.focus();
        }
      }
    };
    document.addEventListener('keydown', this.handler, true);
  },
  close() {
    if (this.handler) document.removeEventListener('keydown', this.handler, true);
    this.handler = null;
    const opener = this.opener;
    this.opener = this.overlay = this.onDismiss = null;
    if (opener && opener.focus) opener.focus({ preventScroll: true });
  }
};

const App = {
  stamp: '🌟',
  STAMP_SIZE: 56,     // px, fixed — replaces the old color+brush-size controls
  stamps: [],         // committed stamps: { emoji, x, y } in normalized 0..1 coords
  placing: null,      // new stamp being carried by the current gesture, not yet committed
  lifting: null,      // { stamp, x, y, startTime, lifted, hoverTrash, raf } — an existing stamp being tapped/lifted/dragged
  trashArmed: false,  // tap-to-arm mode: the next tap on an existing stamp deletes it
  erasingStamps: new Set(), // stamps mid-removal-animation — treated as already gone for hit-testing
  LIFT_MS: 350,            // hold duration on an existing stamp before it lifts for repositioning
  STAMP_HIT_RADIUS: 0.6,   // fraction of STAMP_SIZE counted as "touching" a placed stamp
  audioCtx: null,

  recents: [],        // most-recently-picked stamps, newest first, deduped
  RECENTS_MAX: 8,

  init() {
    this.cacheDOM();
    this.buildPicker();
    this.bindEvents();
    this.setupPWA();
    // defer so layout is complete before we measure canvas dimensions
    requestAnimationFrame(() => this.newGame());
  },

  cacheDOM() {
    this.canvas = document.getElementById('drawing-canvas');
    this.ctx = this.canvas.getContext('2d');
    // Read the theme accent once so canvas-drawn cues (the lift halo) stay in
    // sync with the CSS --accent variable instead of a duplicated literal.
    this.accent = (getComputedStyle(document.documentElement)
      .getPropertyValue('--accent').trim()) || '#DE7590';
    this.canvasWrap = document.getElementById('canvas-wrap');
    this.statusEl = document.getElementById('status');
    this.newGameBtn = document.getElementById('new-game');
    this.stampBtn = document.getElementById('stamp-btn');
    this.trashBtn = document.getElementById('trash-btn');
    this.pickerOverlay = document.getElementById('picker-overlay');
    this.closePickerBtn = document.getElementById('close-picker');
    this.pickerNav = document.getElementById('picker-nav');
    this.pickerScroll = document.getElementById('picker-scroll');
  },

  createEmojiButton(emoji) {
    const btn = document.createElement('button');
    btn.className = 'emoji-opt';
    btn.textContent = emoji;
    btn.dataset.emoji = emoji;
    return btn;
  },

  buildPicker() {
    // Scroll-spy: highlights the jump chip for whichever category section
    // is currently at the top of the visible scroll area. A short section
    // (e.g. Recent with only one or two stamps) can intersect the trigger
    // zone at the same time as the section right after it, so we can't just
    // trust the last entry in the batch — instead track everything
    // currently intersecting and always take the one earliest in DOM order.
    this.visibleSections = new Set();
    this.sectionObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        const key = entry.target.dataset.navKey;
        if (entry.isIntersecting) this.visibleSections.add(key);
        else this.visibleSections.delete(key);
      });
      const sections = this.pickerScroll.querySelectorAll('.picker-category');
      const topMost = Array.from(sections).find((s) => this.visibleSections.has(s.dataset.navKey));
      if (topMost) {
        document.querySelectorAll('.nav-chip').forEach((c) => c.classList.toggle('active', c.dataset.navKey === topMost.dataset.navKey));
      }
    }, { root: this.pickerScroll, rootMargin: '0px 0px -70% 0px', threshold: 0 });

    // Recent row — hidden (both section and chip) until the child has
    // actually picked a stamp; an empty "Recent" section is just confusing.
    this.recentChip = document.createElement('button');
    this.recentChip.className = 'nav-chip hidden';
    this.recentChip.textContent = '🕒';
    this.recentChip.dataset.navKey = 'recent';
    this.recentChip.setAttribute('aria-label', 'Jump to recently used stamps');
    this.pickerNav.appendChild(this.recentChip);

    this.recentSection = document.createElement('div');
    this.recentSection.className = 'picker-category empty';
    this.recentSection.dataset.navKey = 'recent';
    this.recentGrid = document.createElement('div');
    this.recentGrid.className = 'picker-grid recent-grid';
    this.recentSection.appendChild(this.recentGrid);
    // No divider above Recent — it's always the first section when shown,
    // directly under the nav chips, so there's nothing above it to divide from.
    this.pickerScroll.appendChild(this.recentSection);
    this.sectionObserver.observe(this.recentSection);

    EMOJI_CATEGORIES.forEach((cat, i) => {
      const navKey = 'cat' + i;

      const chip = document.createElement('button');
      chip.className = 'nav-chip';
      chip.textContent = cat.label.split(' ')[0];
      chip.dataset.navKey = navKey;
      chip.setAttribute('aria-label', 'Jump to ' + cat.label.replace(/^\S+\s/, ''));
      this.pickerNav.appendChild(chip);

      const section = document.createElement('div');
      section.className = 'picker-category';
      section.dataset.navKey = navKey;

      const divider = document.createElement('div');
      divider.className = 'picker-divider';
      section.appendChild(divider);

      const grid = document.createElement('div');
      grid.className = 'picker-grid';
      cat.emojis.forEach((emoji) => grid.appendChild(this.createEmojiButton(emoji)));
      section.appendChild(grid);

      this.pickerScroll.appendChild(section);
      this.sectionObserver.observe(section);
    });

    this.pickerNav.addEventListener('click', (e) => {
      const chip = e.target.closest('.nav-chip');
      if (!chip || chip.classList.contains('hidden')) return;
      const target = this.pickerScroll.querySelector('.picker-category[data-nav-key="' + chip.dataset.navKey + '"]');
      if (target) target.scrollIntoView({ block: 'start', behavior: 'smooth' });
    });
  },

  addToRecents(emoji) {
    this.recents = this.recents.filter((e) => e !== emoji);
    this.recents.unshift(emoji);
    if (this.recents.length > this.RECENTS_MAX) this.recents.length = this.RECENTS_MAX;

    this.recentGrid.innerHTML = '';
    this.recents.forEach((e) => this.recentGrid.appendChild(this.createEmojiButton(e)));
    const hasRecents = this.recents.length > 0;
    this.recentSection.classList.toggle('empty', !hasRecents);
    this.recentChip.classList.toggle('hidden', !hasRecents);
  },

  bindEvents() {
    this.newGameBtn.addEventListener('click', () => this.newGame());

    this.stampBtn.addEventListener('click', () => this.openPicker());
    this.closePickerBtn.addEventListener('click', () => this.closePicker());
    this.pickerOverlay.addEventListener('click', (e) => { if (e.target === this.pickerOverlay) this.closePicker(); });
    this.pickerScroll.addEventListener('click', (e) => {
      const btn = e.target.closest('.emoji-opt');
      if (btn) this.selectStamp(btn.dataset.emoji);
    });

    this.trashBtn.addEventListener('click', () => this.toggleTrash());
    document.getElementById('save-btn').addEventListener('click', () => this.downloadPainting());

    this.canvas.addEventListener('pointerdown', (e) => this.onPointerDown(e));
    this.canvas.addEventListener('pointermove', (e) => this.onPointerMove(e));
    this.canvas.addEventListener('pointerup', (e) => this.onPointerUp(e));
    this.canvas.addEventListener('pointercancel', (e) => this.onPointerUp(e));
    this.canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    window.addEventListener('resize', () => {
      const newW = this.canvasWrap.clientWidth;
      const newH = this.canvasWrap.clientHeight;
      if (this.canvas.width !== newW || this.canvas.height !== newH) {
        this.syncCanvasSize();
        this.redrawCanvas();
      }
    });
  },

  // Normalize pointer coords to 0..1 so stamps survive canvas resize
  getCanvasPoint(e) {
    const rect = this.canvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) / rect.width,
      y: (e.clientY - rect.top) / rect.height
    };
  },

  toCanvasX(xn) { return xn * this.canvas.width; },
  toCanvasY(yn) { return yn * this.canvas.height; },

  syncCanvasSize() {
    const w = this.canvasWrap.clientWidth;
    const h = this.canvasWrap.clientHeight;
    this.canvas.width = w;
    this.canvas.height = h;
    this.canvas.style.width = w + 'px';
    this.canvas.style.height = h + 'px';
  },

  newGame() {
    this.stamps = [];
    this.placing = null;
    if (this.lifting) { cancelAnimationFrame(this.lifting.raf); this.lifting = null; }
    this.erasingStamps.clear();
    this.trashArmed = false;
    this.updateTrashBtnVisual();
    this.syncCanvasSize();
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    this.statusEl.textContent = 'New painting started.';
  },

  onPointerDown(e) {
    e.preventDefault();
    const pt = this.getCanvasPoint(e);
    this.canvas.setPointerCapture(e.pointerId);

    const hit = this.findStampAt(pt);
    if (hit) {
      this.lifting = { stamp: hit, x: pt.x, y: pt.y, startTime: performance.now(), lifted: false, hoverTrash: false, raf: null };
      this.lifting.raf = requestAnimationFrame((t) => this.tickLiftTimer(t));
      return;
    }

    // Trash-armed mode only acts on existing stamps — a tap on empty canvas
    // while armed is a no-op, not a new placement, so the tool reads as
    // "deleting," not "deleting, except when it draws instead."
    if (this.trashArmed) return;

    this.placing = { emoji: this.stamp, x: pt.x, y: pt.y };
    this.redrawCanvas();
  },

  onPointerMove(e) {
    const pt = this.getCanvasPoint(e);

    if (this.lifting) {
      this.lifting.x = pt.x;
      this.lifting.y = pt.y;
      if (this.lifting.lifted) {
        this.lifting.x = Math.max(0, Math.min(1, this.lifting.x));
        this.lifting.y = Math.max(0, Math.min(1, this.lifting.y));
        this.updateTrashHover(e);
        this.redrawLifted();
      }
      return;
    }

    if (!this.placing) return;
    this.placing.x = Math.max(0, Math.min(1, pt.x));
    this.placing.y = Math.max(0, Math.min(1, pt.y));
    this.redrawCanvas();
  },

  onPointerUp(e) {
    if (this.lifting) {
      const { stamp, lifted, hoverTrash, x, y } = this.lifting;
      cancelAnimationFrame(this.lifting.raf);
      this.lifting = null;

      if (!lifted) {
        // A quick tap on an existing stamp that never reached the lift
        // threshold: in trash-armed mode that's the delete gesture: outside
        // it, tapping an existing stamp does nothing (no accidental stacking).
        if (this.trashArmed) {
          this.trashArmed = false;
          this.updateTrashBtnVisual();
          this.deleteStamp(stamp);
        } else {
          this.updateTrashBtnVisual();
          this.redrawCanvas();
        }
        return;
      }

      this.updateTrashBtnVisual();
      if (hoverTrash) {
        this.deleteStamp(stamp);
      } else {
        stamp.x = x;
        stamp.y = y;
        this.audioClick();
        this.redrawCanvas();
      }
      return;
    }

    if (!this.placing) return;
    this.stamps.push(this.placing);
    this.placing = null;
    this.audioStamp();
    this.redrawCanvas();
  },

  // Nearest placed stamp within touching distance of a point, topmost first
  // (last drawn = last in the array = visually on top, so that's what a tap
  // on overlapping stamps should mean). Stamps mid-removal-animation don't
  // count — they're already "gone" as far as new hits are concerned.
  findStampAt(pt) {
    const radius = this.STAMP_SIZE * this.STAMP_HIT_RADIUS;
    const px = this.toCanvasX(pt.x);
    const py = this.toCanvasY(pt.y);
    for (let i = this.stamps.length - 1; i >= 0; i--) {
      const s = this.stamps[i];
      if (this.erasingStamps.has(s)) continue;
      const dist = Math.hypot(px - this.toCanvasX(s.x), py - this.toCanvasY(s.y));
      if (dist <= radius) return s;
    }
    return null;
  },

  // Tap-to-arm mode: tap the trash button, then tap any placed stamp to
  // remove it. One-shot — it disarms itself the moment it's used (see
  // onPointerUp), and selecting a new stamp from the picker disarms it too.
  toggleTrash() {
    this.trashArmed = !this.trashArmed;
    this.updateTrashBtnVisual();
    this.statusEl.textContent = this.trashArmed ? 'Tap a stamp to remove it.' : 'Trash off.';
  },

  updateTrashBtnVisual() {
    const hover = this.lifting && this.lifting.hoverTrash;
    this.trashBtn.classList.toggle('active', this.trashArmed || !!hover);
  },

  // Is the pointer currently over the trash button? Uses real viewport
  // coordinates since the button lives outside the canvas — pointer capture
  // keeps events targeting the canvas, but clientX/Y still reflect wherever
  // the finger actually is on screen.
  updateTrashHover(e) {
    const rect = this.trashBtn.getBoundingClientRect();
    const hover = e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom;
    this.lifting.hoverTrash = hover;
    this.updateTrashBtnVisual();
  },

  // Build an rgba-equivalent from the cached --accent hex plus an alpha byte
  // (8-digit hex is valid as a canvas fillStyle), so the accent lives in one place.
  accentAlpha(a) {
    const byte = Math.max(0, Math.min(255, Math.round(a * 255)));
    return this.accent + byte.toString(16).padStart(2, '0');
  },

  // Canvas port of a "picking this up" cue: a soft accent-colored halo grows
  // in while held (deliberately not red — this hold isn't a delete
  // countdown, just a grab), at a fixed position until the hold completes.
  tickLiftTimer(now) {
    if (!this.lifting || this.lifting.lifted) return;
    const progress = Math.min(1, (now - this.lifting.startTime) / this.LIFT_MS);
    const stamp = this.lifting.stamp;

    this.redrawCanvas();
    const cx = this.toCanvasX(stamp.x);
    const cy = this.toCanvasY(stamp.y);
    this.ctx.save();
    this.ctx.beginPath();
    this.ctx.arc(cx, cy, this.STAMP_SIZE / 2 + 6, 0, Math.PI * 2);
    this.ctx.fillStyle = this.accentAlpha(0.3 * progress);
    this.ctx.fill();
    this.ctx.restore();
    this.drawStamp(stamp.emoji, stamp.x, stamp.y);

    if (progress >= 1) {
      this.lifting.lifted = true;
      this.audioClick();
      this.redrawLifted();
    } else {
      this.lifting.raf = requestAnimationFrame((t) => this.tickLiftTimer(t));
    }
  },

  // Once lifted, the stamp rides slightly enlarged with a soft drop shadow
  // at the live drag position, like Shape Fit's pieces riding above the
  // finger while held.
  redrawLifted() {
    this.redrawCanvas();
    const { stamp, x, y } = this.lifting;
    this.ctx.save();
    this.ctx.shadowColor = 'rgba(0,0,0,0.25)';
    this.ctx.shadowBlur = 10;
    this.drawStamp(stamp.emoji, x, y, 1, 1.15);
    this.ctx.restore();
  },

  deleteStamp(stamp) {
    this.erasingStamps.add(stamp);
    this.audioSwoosh();
    if (navigator.vibrate) navigator.vibrate(40);
    this.animateRemoval(stamp);
  },

  // Sudoku's `.cleared`/`suction` keyframe (scale 1 → 0.1, fade to 0) ported
  // to canvas frames, since there's no element here for a CSS animation to
  // shrink-and-fade the actual stamp out before it leaves the board.
  animateRemoval(stamp) {
    const DURATION = 220;
    const start = performance.now();
    const step = (now) => {
      const t = Math.min(1, (now - start) / DURATION);
      this.redrawCanvas({ skip: stamp });
      this.drawStamp(stamp.emoji, stamp.x, stamp.y, 1 - t, 1 - t * 0.9);
      if (t < 1) {
        requestAnimationFrame(step);
      } else {
        const idx = this.stamps.indexOf(stamp);
        if (idx !== -1) this.stamps.splice(idx, 1);
        this.erasingStamps.delete(stamp);
        this.redrawCanvas();
      }
    };
    requestAnimationFrame(step);
  },

  drawStamp(emoji, xn, yn, alpha = 1, scale = 1) {
    this.ctx.save();
    this.ctx.globalAlpha = alpha;
    this.ctx.font = `${this.STAMP_SIZE * scale}px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif`;
    this.ctx.textAlign = 'center';
    this.ctx.textBaseline = 'middle';
    this.ctx.fillText(emoji, this.toCanvasX(xn), this.toCanvasY(yn));
    this.ctx.restore();
  },

  redrawCanvas(opts = {}) {
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    // A stamp being lifted/dragged is drawn separately (see redrawLifted),
    // at the live drag position rather than its resting one.
    const liftingStamp = this.lifting ? this.lifting.stamp : null;
    this.stamps.forEach((s) => {
      if (s === opts.skip || s === liftingStamp) return;
      this.drawStamp(s.emoji, s.x, s.y);
    });
    // The stamp currently being carried (mid-gesture) isn't committed yet —
    // show it translucent so the child can see where it will land.
    if (this.placing) this.drawStamp(this.placing.emoji, this.placing.x, this.placing.y, 0.55);
  },

  downloadPainting() {
    const a = document.createElement('a');
    a.href = this.canvas.toDataURL('image/png');
    a.download = 'emoji-paint.png';
    a.click();
    this.statusEl.textContent = 'Painting saved.';
  },

  openPicker() {
    document.querySelectorAll('.emoji-opt').forEach((b) => b.classList.toggle('active', b.dataset.emoji === this.stamp));
    // A hidden (display:none) element has no scrollbox, so scrollTop must be
    // set after showing the overlay — setting it first is a silent no-op.
    this.pickerOverlay.classList.add('show');
    // Always open at the top — with jump chips for fast travel, a
    // predictable starting point beats remembering the last scroll spot.
    this.pickerScroll.scrollTop = 0;
    const firstVisible = this.pickerScroll.querySelector('.picker-category:not(.empty)');
    if (firstVisible) {
      document.querySelectorAll('.nav-chip').forEach((c) => c.classList.toggle('active', c.dataset.navKey === firstVisible.dataset.navKey));
    }
    Modal.open(this.pickerOverlay, () => this.closePicker());
  },
  closePicker() { this.pickerOverlay.classList.remove('show'); Modal.close(); },

  selectStamp(emoji) {
    this.stamp = emoji;
    this.stampBtn.textContent = emoji;
    this.addToRecents(emoji);
    // Picking a new stamp is a "let's draw" action — disarm the trash tool
    // so a stray tap on the canvas doesn't delete instead of place.
    if (this.trashArmed) { this.trashArmed = false; this.updateTrashBtnVisual(); }
    this.audioClick();
    this.statusEl.textContent = `Stamp selected: ${emoji}`;
    this.closePicker();
  },

  setupPWA() {
    const manifest = {
      name: 'Emoji Paint',
      short_name: 'Emoji Paint',
      start_url: '.',
      display: 'standalone',
      background_color: '#FFF3F6',
      theme_color: '#DE7590',
      icons: [
        { src: this.makeIcon(192), sizes: '192x192', type: 'image/svg+xml' },
        { src: this.makeIcon(512), sizes: '512x512', type: 'image/svg+xml' }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    document.getElementById('manifest-link').href = URL.createObjectURL(blob);

    // Service workers must be registered from a real http(s) URL —
    // browsers reject blob:/data: worker scripts. sw.js lives next to
    // this file; at file:// there is no service worker support anyway.
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  },

  makeIcon(size) {
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#FFF3F6" rx="18"/>
      <rect x="18" y="14" width="64" height="58" rx="10" fill="#fff" stroke="#DE7590" stroke-width="4"/>
      <text x="50" y="55" text-anchor="middle" font-size="34">🌟</text>
    </svg>`;
    return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
  },

  ensureAudio() {
    if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
  },

  playTone({ type = 'sine', freq = 440, duration = 100, startGain = 0.0001, peakGain = 0.15 }) {
    this.ensureAudio();
    const ctx = this.audioCtx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(startGain, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(peakGain, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration / 1000);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration / 1000 + 0.02);
  },

  audioStamp() {
    this.playTone({ type: 'sine', freq: 700 + Math.random() * 220, duration: 90, peakGain: 0.18 });
  },

  audioClick() {
    this.playTone({ type: 'sine', freq: 520, duration: 40, peakGain: 0.08 });
  },

  audioSwoosh() {
    this.ensureAudio();
    const ctx = this.audioCtx;
    const n = Math.floor(ctx.sampleRate * 0.1);
    const buf = ctx.createBuffer(1, n, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);
    src.connect(gain).connect(ctx.destination);
    src.start();
  }
};

App.init();
</script>
</body>
</html>
