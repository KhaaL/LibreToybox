<!DOCTYPE html>
<!-- LibreToybox — What's Next? · Licensed under the GNU GPL v3.0; see ../LICENSE -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What's Next?</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪁</text></svg>" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <meta name="theme-color" content="#5B6FD8" />
  <style>
    :root {
      --bg1: #F2F2FF;
      --bg2: #DEE2FF;
      --accent: #5B6FD8;
      --border: #C7CBF2;
      --text: #35335F;
      --shadow: #BEC3EA;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; }
    /* Own background on html stops the body gradient propagating into
       overscroll, where it would tile and show the wrong end of the gradient. */
    html { background: var(--bg1); }
    body {
      font-family: ui-rounded, 'Hiragino Maru Gothic ProN', Quicksand, Comfortaa, 'Arial Rounded MT Bold', 'Varela Round', Calibri, sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100%;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }

    header {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 6px;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .logo { display: flex; align-items: center; }
    .top-btns { display: flex; gap: 8px; }
    .top-btn {
      position: relative;
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 3px 0 var(--shadow);
      transition: transform .05s;
      min-width: 48px;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: inherit;
    }
    .top-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--shadow); }
    /* New Game requires a deliberate hold, not a quick tap, so an accidental
       tap can't silently wipe progress. */
    .hold-progress { position: absolute; inset: 5px; border-radius: 50%; pointer-events: none; opacity: 0; transition: opacity .1s; }
    .top-btn.holding .hold-progress { opacity: 1; }

    main { width: 100%; max-width: 420px; padding: 8px 16px 18px; display: flex; flex-direction: column; align-items: center; gap: 18px; }

    /* Visually hidden but available to screen readers (aria-live announcements
       still fire). Standard clip-based sr-only pattern. */
    .status { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); clip-path: inset(50%); white-space: nowrap; border: 0; }

    /* Progress pips — one per round in a set, filled as rounds are solved.
       Visual only (no numbers), design principle 1. */
    #pips { display: flex; gap: 10px; margin-top: 4px; }
    .pip {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--border);
      transition: background .2s, transform .2s;
    }
    .pip.filled { background: var(--accent); border-color: var(--accent); transform: scale(1.1); }

    /* The pattern strip is display-only, never tapped — like Shape Fit's board
       cells vs. its draggable pieces, these tiles are exempt from the ≥60px
       interactive-target rule (principle 4 covers TAP targets) so an 8-item
       Hard sequence can still wrap cleanly on a phone width. */
    #sequence {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .seq-tile {
      flex: 0 0 auto;
      width: 54px;
      height: 54px;
      background: #fff;
      border: 3px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 3px 0 var(--shadow);
      font-size: 1.8rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* The mystery slot — dashed border + accent tint marks it as "not yet
       known" until a correct pick resolves it into the real answer. */
    .seq-tile.blank { border-style: dashed; background: var(--bg2); color: var(--accent); font-size: 1.5rem; }
    /* Not clickable (win-screen recap only), so no pointer cursor. */
    .seq-tile.recap { cursor: default; }

    /* The answer options — real, tappable ≥60px tiles, same look/feel/
       animation classes as every other guessing game in the suite. */
    #options {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .tile {
      width: 72px;
      height: 72px;
      background: #fff;
      border: 3px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 4px 0 var(--shadow);
      font-size: clamp(2rem, 10vw, 2.6rem);
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      transition: transform .08s, box-shadow .08s, opacity .25s;
    }
    .tile:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--shadow); }
    .tile:focus-visible { outline: 4px solid var(--accent); outline-offset: -4px; }
    /* .deal is declared before .correct/.wrong/.revealed on purpose: it shares
       their exact specificity (two classes each), and a tile can still be
       mid-deal when it's tapped. With equal specificity the LATER rule wins
       the "animation" property outright, so those must come after .deal in
       source order to reliably override its pop-in the instant either class
       is added — not just once .deal's own animationend fires (see the
       JS-side .deal cleanup for the belt-and-braces half of this fix). */
    @keyframes pop-in { 0% { transform: scale(0.4); opacity: 0; } 60% { transform: scale(1.12); opacity: 1; } 100% { transform: scale(1); } }
    .seq-tile.deal, .tile.deal { animation: pop-in .35s ease-out both; }
    .seq-tile.revealed { animation: pop .5s ease-out; }
    .tile.correct { animation: pop .5s ease-out; }
    /* Wrong tap = shake + a red flash (the suite's shared "wrong" cue, e.g.
       Sudoku's .conflict) so it's unmissable but still non-punitive — the
       tile settles straight back to neutral (design principle 3). */
    .tile.wrong { animation: shake .4s ease, wrongFlash .5s ease; }
    /* When a correct pick resolves, the other options gently fade back. */
    #options.resolved .tile:not(.correct) { opacity: 0.35; }

    /* Generated shapes (Hard tier). A "shape:family:n" item is drawn as inline
       SVG instead of an emoji glyph. Constant accent fill + a darker same-hue
       edge (design principle 11 — flat fill + darker edge, no gradient) so the
       COUNT (star points / polygon sides / dots) is the ONLY variable between
       tiles, the same "uniform tiles" idea Odd One Out uses. Tiles are already
       flex-centered, so the SVG just sits at 82% and stays centred. */
    .seq-tile svg, .tile svg { width: 82%; height: 82%; display: block; }
    .shp { fill: var(--accent); stroke: #3B46A0; stroke-width: 3.5; stroke-linejoin: round; }

    @keyframes pop { 0% { transform: scale(1); } 45% { transform: scale(1.25); } 100% { transform: scale(1); } }
    @keyframes shake { 0%,100% { transform: translateX(0); } 15% { transform: translateX(-9px); } 30% { transform: translateX(9px); } 45% { transform: translateX(-7px); } 60% { transform: translateX(7px); } 75% { transform: translateX(-4px); } }
    @keyframes wrongFlash { 0%,100% { border-color: var(--border); background: #fff; } 20%,65% { border-color: #E53935; background: #FFCDD2; } }
    @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
    @keyframes wiggle { 0%, 100% { transform: rotate(0) scale(1); } 25% { transform: rotate(-12deg) scale(1.25); } 55% { transform: rotate(9deg) scale(1.12); } 80% { transform: rotate(-4deg) scale(1.04); } }

    .overlay {
      position: fixed; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; text-align: center; padding: 20px;
    }
    .overlay.show { display: flex; }
    #win-overlay { background: rgba(255,255,255,0.55); justify-content: flex-end; padding-bottom: 12vh; }
    #settings-overlay, #tutorial-overlay { background: rgba(255,255,255,0.92); }

    .emoji-row { font-size: 4.5rem; display: flex; gap: 18px; margin-bottom: 22px; }
    .emoji-row button { background: none; border: none; padding: 0; font: inherit; cursor: pointer; animation: pop-in .6s ease-out both; }
    .emoji-row button:nth-child(2) { animation-delay: .15s; }
    .emoji-row button:nth-child(3) { animation-delay: .3s; }
    .emoji-row button:focus-visible { outline: 3px solid var(--text); outline-offset: 2px; border-radius: 12px; }
    .emoji-row button.wiggle { animation: wiggle .5s ease; }

    .settings-card {
      background: #fff; border: 3px solid var(--border); border-radius: 18px;
      padding: 22px 26px; box-shadow: 0 10px 28px rgba(0,0,0,0.15);
      display: flex; flex-direction: column; align-items: center; gap: 14px; min-width: 260px;
    }
    .settings-card h2 { margin: 0; font-size: 2rem; }
    .size-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 18px; max-width: 252px; }
    .size-btn {
      width: 72px; height: 72px; border: 2px solid var(--border); border-radius: 16px;
      background: #fff; font-family: inherit; font-size: 1.7rem; cursor: pointer;
      box-shadow: 0 4px 0 var(--shadow); transition: transform .05s;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; color: var(--text);
    }
    .size-btn small { font-size: 0.72rem; }
    .size-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--shadow); }
    .size-btn.active { box-shadow: 0 0 0 4px var(--accent), 0 4px 0 var(--shadow); }

    .confetti { position: fixed; top: 0; left: 0; width: 10px; height: 10px; pointer-events: none; z-index: 101; animation: fall linear forwards; }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <a class="top-btn" id="back-btn" href="../index.html" aria-label="Back to LibreToybox home">🏠</a>
      <div class="logo" role="img" aria-label="What's Next?" title="What's Next?">
        <svg viewBox="0 0 48 48" width="40" height="40" aria-hidden="true">
          <circle cx="8" cy="24" r="6" fill="#8ED3F4" stroke="#54A6D2" stroke-width="2"/>
          <circle cx="24" cy="24" r="6" fill="#FFE66D" stroke="#DCBC2E" stroke-width="2"/>
          <circle cx="40" cy="24" r="7" fill="none" stroke="#5B6FD8" stroke-width="3" stroke-dasharray="4 3"/>
          <text x="40" y="28.5" font-size="12" text-anchor="middle" fill="#5B6FD8" font-family="ui-rounded, sans-serif" font-weight="bold">?</text>
        </svg>
      </div>
    </div>
    <div class="top-btns">
      <button class="top-btn" id="new-game" aria-label="New Game">🔄<span class="hold-progress" aria-hidden="true"></span></button>
      <button class="top-btn" id="settings-btn" aria-label="Settings">⚙️</button>
      <button class="top-btn" id="tutorial-btn" aria-label="How to Play">❓</button>
    </div>
  </header>

  <main>
    <div class="status" id="status" aria-live="polite"></div>
    <div id="pips" role="img" aria-label="Progress"></div>
    <div id="sequence" role="img" aria-label="Pattern"></div>
    <div id="options" role="group" aria-label="Which comes next?"></div>
  </main>

  <div class="overlay" id="win-overlay" role="dialog" aria-modal="true" aria-label="You won">
    <div class="emoji-row" id="emoji-row"></div>
    <div class="top-btns">
      <a class="top-btn" id="win-home-btn" href="../index.html" aria-label="Back to LibreToybox home">🏠</a>
      <button class="top-btn" id="play-again" aria-label="Play Again">🔄</button>
    </div>
  </div>

  <div class="overlay" id="settings-overlay" role="dialog" aria-modal="true" aria-label="Settings">
    <div class="settings-card">
      <h2>⚙️</h2>
      <div class="size-row" role="radiogroup" aria-label="Difficulty">
        <button class="size-btn" data-size="easy"   role="radio" aria-label="Easy, patterns of three">🐣<small>3</small></button>
        <button class="size-btn" data-size="medium" role="radio" aria-label="Normal, patterns of four">🕊️<small>4</small></button>
        <button class="size-btn" data-size="hard"   role="radio" aria-label="Hard, tricky patterns and shapes">🦅<small>5</small></button>
      </div>
      <button class="top-btn" id="close-settings" aria-label="Close">✕</button>
    </div>
  </div>

  <div class="overlay" id="tutorial-overlay" role="dialog" aria-modal="true" aria-label="How to Play">
    <div class="settings-card">
      <h2>🎓</h2>
      <p>Tutorial coming soon!</p>
      <button class="top-btn" id="close-tutorial" aria-label="Close">✕</button>
    </div>
  </div>

<script>
// Small, mutually-independent thematic sets. Each round picks ONE set, so
// overlap between sets (e.g. ⭐ appearing in both "shapes" and "sky") is
// harmless — only one set is ever in play at a time. Every set needs at
// least period(3) + decoys(1) = 4 distinct members; 5 gives headroom.
const PATTERN_SETS = [
  ['☀️','🌧️','⛈️','❄️','🌈'],   // weather
  ['🔴','🔺','🟦','⭐','🟣'],   // shapes
  ['🍎','🍌','🍇','🍊','🍓'],   // fruit
  ['🐱','🐶','🐰','🐻','🦊'],   // animals
  ['🌙','⭐','☁️','🌈','☀️'],   // sky
  ['🐠','🐳','🦀','🐙','🦐'],   // sea
];

// Naturally-ordered progressions the child extends FORWARD (not a loop to
// spot). `cyclic` sets wrap around (clock, moon, rotation); the rest are
// bounded, so buildOrdered() only starts where the shown window + the answers
// stay in range. Each is visually self-evident (a filling moon, an advancing
// clock hand, counting up) so no reading is required (design principle 1).
const ORDERED_SETS = [
  { cyclic: false, items: ['1️⃣','2️⃣','3️⃣','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣'] }, // counting up
  { cyclic: true,  items: ['🕐','🕑','🕒','🕓','🕔','🕕','🕖','🕗','🕘','🕙','🕚','🕛'] }, // clock hours
  { cyclic: true,  items: ['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'] }, // moon phases
  { cyclic: true,  items: ['⬆️','➡️','⬇️','⬅️'] }, // rotating clockwise
  { cyclic: false, items: ['🥚','🐣','🐤','🐔'] }, // chick growing up
];

// Structured repeat-unit templates (unit length 3 — `structured` only runs at
// Easy, whose period is 3). A letter maps to a distinct emoji, so a unit like
// 'AAB' repeats a member WITHIN the unit — the child reads the unit's SHAPE
// instead of assuming every tile is a new emoji. None is a shorter cycle in
// disguise (e.g. no 'ABAB'), so each is genuinely structured, not just a
// smaller period.
const SHAPES_3 = ['AAB', 'ABB', 'ABA'];

// Hard-tier generated shapes (the "star with different edge counts" idea). The
// varying attribute is a COUNT — star points, polygon sides, or number of dots
// — and each family's [min, max] bounds keep every generated run renderable.
// A shape is stored as a "shape:<family>:<n>" string token, so the same
// string-equality/dedup logic (===, includes, Set, filter) the emoji builders
// rely on keeps working with no special-casing; only rendering branches on it.
// Star and dots are capped at 6 (a hexagram is about as many points as a
// child can still count at a glance; 6 dots is a die's highest face, so
// dotsSVG can use real die-face pip layouts for the whole range). Star's
// 3-value range means some star rounds render fewer than the tier's usual 4
// options (buildShape's distractor search only finds 2) — buildOptions
// already handles a short pool gracefully elsewhere in this file, so that's
// expected, not a bug.
const SHAPE_FAMILIES = { star: [4, 6], poly: [3, 8], dots: [1, 6] };
const POLY_NAMES = { 3: 'triangle', 4: 'square', 5: 'pentagon', 6: 'hexagon', 7: 'heptagon', 8: 'octagon' };

// Named positions on a 3×3 grid (viewBox 0-100), the same layout a real die
// prints its pips on. DICE_FACES picks which positions light up for 1-6 —
// the classic arrangement (1 centre, 2 diagonal corners, 3 a diagonal line,
// 4 all corners, 5 corners + centre, 6 two columns of three), not a generic
// row-wrapping grid, so each count is instantly recognizable.
const DICE_POS = { TL: [28, 28], TR: [72, 28], ML: [28, 50], MR: [72, 50], BL: [28, 72], BR: [72, 72], C: [50, 50] };
const DICE_FACES = {
  1: ['C'],
  2: ['TL', 'BR'],
  3: ['TL', 'C', 'BR'],
  4: ['TL', 'TR', 'BL', 'BR'],
  5: ['TL', 'TR', 'C', 'BL', 'BR'],
  6: ['TL', 'TR', 'ML', 'MR', 'BL', 'BR']
};

const CONFIG = {
  roundsPerSet: 5,
  advanceMs: 700,   // pause after a correct pick before the next round (gameId-guarded)
  wrongHoldMs: 500, // input lock while the reject shake/flash plays (matches wrongFlash's duration)
  // Each tier draws its rounds from a `kinds` list — the difficulty ramp is the
  // KIND of pattern reasoning, not just the string length (design principles 8
  // & 9, folded into the existing three tiers with no new level/toggle). Every
  // tier asks for exactly ONE hidden position (one "?" box). Each kind belongs
  // to exactly ONE tier, except `cycle`, shared by Easy+Normal — a clean
  // partition rather than kinds piling up toward Hard:
  //   Easy   — `cycle` (straight repeating loop) + `structured` (repeat-unit
  //            shapes like AAB/ABB, exclusively here)
  //   Normal — `cycle` + `ordered` (naturally-ordered progressions — counting,
  //            clock, moon, rotation, growth — exclusively here)
  //   Hard   — `shape` only: procedurally-drawn stars/polygons/dots whose
  //            COUNT follows a possibly non-linear rule (grow, shrink, repeat,
  //            or an alternating step like +2/−1); every Hard round is one of
  //            these, with no emoji patterns at all.
  sizes: {
    easy:   { seqLength: 6,  period: 3, options: 3, guesses: 1, kinds: ['cycle', 'structured'] }, // 🐣 (default)
    medium: { seqLength: 8,  period: 4, options: 4, guesses: 1, kinds: ['cycle', 'ordered'] },     // 🕊️
    hard:   { seqLength: 10, period: 5, options: 4, guesses: 1, kinds: ['shape'] }                 // 🦅 shapes only
  },
  // Celebration grows with difficulty — Easy is today's unchanged baseline,
  // Normal/Hard add more confetti and extra rising notes on the same fanfare.
  celebrationTiers: [
    { confetti: 60,  notes: [523.25, 659.25, 783.99] },
    { confetti: 90,  notes: [523.25, 659.25, 783.99, 1046.50] },
    { confetti: 130, notes: [523.25, 659.25, 783.99, 1046.50, 1318.51] }
  ],
  // Canonical LibreToybox pastel palette — used for confetti (design principle 11).
  palette: ['#F7A6B9','#F9C784','#FFE66D','#A8E6CF','#8ED3F4','#C3B4F7','#FFB3A0','#C8E88A']
};

// --- Shared modal a11y helper (copied into each game — the suite ships no
// bundler). Moves focus into an opened overlay, traps Tab within it, closes on
// Escape, and restores focus to the opener on close (design principle 8). ---
const Modal = {
  opener: null, overlay: null, onDismiss: null, handler: null,
  focusable(el) {
    return [...el.querySelectorAll('a[href], button:not([disabled]), input, select, textarea, [tabindex]:not([tabindex="-1"])')]
      .filter(n => n.getClientRects().length > 0);
  },
  open(overlay, onDismiss) {
    this.opener = document.activeElement;
    this.overlay = overlay;
    this.onDismiss = onDismiss || null;
    const items = this.focusable(overlay);
    (items[0] || overlay).focus({ preventScroll: true });
    this.handler = (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        if (this.onDismiss) this.onDismiss(); else this.close();
      } else if (e.key === 'Tab') {
        const f = this.focusable(overlay);
        if (!f.length) { e.preventDefault(); return; }
        const first = f[0], last = f[f.length - 1];
        if (e.shiftKey && (document.activeElement === first || !overlay.contains(document.activeElement))) {
          e.preventDefault(); last.focus();
        } else if (!e.shiftKey && (document.activeElement === last || !overlay.contains(document.activeElement))) {
          e.preventDefault(); first.focus();
        }
      }
    };
    document.addEventListener('keydown', this.handler, true);
  },
  close() {
    if (this.handler) document.removeEventListener('keydown', this.handler, true);
    this.handler = null;
    const opener = this.opener;
    this.opener = this.overlay = this.onDismiss = null;
    if (opener && opener.focus) opener.focus({ preventScroll: true });
  }
};

const App = {
  size: 'easy',
  sequence: [],       // shown pattern items, in display order (excludes the blanks)
  guesses: 1,         // how many hidden positions this round has (always 1)
  answers: [],        // the correct emoji for each hidden position, in order
  stepOptions: [],    // per-hidden-position answer choices, stepOptions[step]
  step: 0,            // which hidden position is currently being guessed
  options: [],        // stepOptions[step] — this step's answer choices, in display order
  blankTiles: [],     // the "?" elements in #sequence, so a correct pick can reveal them
  solved: 0,          // rounds solved in the current set
  answersFound: [],   // every correct answer from this set's solved rounds, in solve order
  resolving: false,   // true during the pause between a correct pick and the next step/round
  rejecting: false,   // true while the wrong-tap shake/flash is playing — blocks tap-spam
  won: false,
  gameId: 0,
  audioCtx: null,

  emojiSets: [
    ['🎉', '🌟', '🏆'],
    ['🎈', '🌈', '🎊'],
    ['🥳', '✨', '🍭']
  ],

  init() {
    this.cacheDOM();
    this.bindEvents();
    this.updateSizeButtons();
    this.newGame();
    this.setupPWA();
  },

  cacheDOM() {
    this.sequenceEl = document.getElementById('sequence');
    this.optionsEl = document.getElementById('options');
    this.pipsEl = document.getElementById('pips');
    this.status = document.getElementById('status');
    this.winOverlay = document.getElementById('win-overlay');
    this.newGameBtn = document.getElementById('new-game');
    this.playAgainBtn = document.getElementById('play-again');
    this.settingsOverlay = document.getElementById('settings-overlay');
    this.settingsBtn = document.getElementById('settings-btn');
    this.closeSettingsBtn = document.getElementById('close-settings');
    this.tutorialOverlay = document.getElementById('tutorial-overlay');
    this.tutorialBtn = document.getElementById('tutorial-btn');
    this.closeTutorialBtn = document.getElementById('close-tutorial');
  },

  bindEvents() {
    this.bindNewGameHold();
    this.playAgainBtn.addEventListener('click', () => this.newGame(true));
    this.settingsBtn.addEventListener('click', () => this.openSettings());
    this.closeSettingsBtn.addEventListener('click', () => this.closeSettings());
    this.settingsOverlay.addEventListener('click', (e) => {
      if (e.target === this.settingsOverlay) this.closeSettings();
    });
    this.tutorialBtn.addEventListener('click', () => this.openTutorial());
    this.closeTutorialBtn.addEventListener('click', () => this.closeTutorial());
    this.tutorialOverlay.addEventListener('click', (e) => {
      if (e.target === this.tutorialOverlay) this.closeTutorial();
    });
    this.settingsOverlay.querySelectorAll('.size-btn').forEach(btn => {
      btn.addEventListener('click', () => this.setSize(btn.dataset.size));
    });
    // One delegated handler covers mouse, touch, pen and keyboard (real
    // <button> tiles fire click on Enter/Space too — keyboard parity, DP8).
    this.optionsEl.addEventListener('click', (e) => {
      const tile = e.target.closest('.tile');
      if (tile) this.pickAnswer(parseInt(tile.dataset.index, 10));
    });
  },

  // New Game requires a deliberate hold, not a quick tap, so an accidental
  // tap can't silently wipe progress. A quick tap/keypress does nothing;
  // only a sustained HOLD_MS hold starts a fresh round.
  bindNewGameHold() {
    const HOLD_MS = 500;
    const btn = this.newGameBtn;
    const ring = btn.querySelector('.hold-progress');
    let timer = null, raf = null, startTime = null, startPt = null, active = false;

    const tick = () => {
      const pct = Math.min(100, ((performance.now() - startTime) / HOLD_MS) * 100);
      ring.style.background = `conic-gradient(rgba(91,111,216,0.85) ${pct}%, transparent ${pct}%)`;
      if (pct < 100) raf = requestAnimationFrame(tick);
    };
    const start = () => {
      if (active) return;
      active = true;
      startTime = performance.now();
      btn.classList.add('holding');
      tick();
      timer = setTimeout(() => {
        active = false;
        btn.classList.remove('holding');
        if (navigator.vibrate) navigator.vibrate(40);
        this.newGame(true);
      }, HOLD_MS);
    };
    const cancel = () => {
      if (!active) return;
      active = false;
      clearTimeout(timer);
      if (raf) cancelAnimationFrame(raf);
      btn.classList.remove('holding');
      ring.style.background = '';
    };

    btn.addEventListener('pointerdown', (e) => { startPt = { x: e.clientX, y: e.clientY }; start(); });
    btn.addEventListener('pointermove', (e) => {
      if (!active || !startPt) return;
      if (Math.hypot(e.clientX - startPt.x, e.clientY - startPt.y) > 10) cancel();
    });
    btn.addEventListener('pointerup', cancel);
    btn.addEventListener('pointercancel', cancel);
    btn.addEventListener('pointerleave', cancel);
    btn.addEventListener('keydown', (e) => {
      if ((e.key === 'Enter' || e.key === ' ') && !e.repeat) { e.preventDefault(); start(); }
    });
    btn.addEventListener('keyup', (e) => {
      if (e.key === 'Enter' || e.key === ' ') cancel();
    });
  },

  shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  },

  // ── Round generation ──────────────────────────────────────────────────
  // A round is built by one of several PATTERN-KIND builders, chosen per round
  // from the current tier's `kinds` list. Every builder returns
  // { sequence, answers, optionPool } and guarantees exactly one correct answer
  // per hidden position BY CONSTRUCTION — so the difficulty scale varies the
  // KIND of pattern reasoning, not just the string length:
  //   • cycle       — a straight repeating loop of distinct emoji (the original);
  //                   shared by Easy + Normal
  //   • structured  — a repeat UNIT with internal shape (AAB/ABB/ABA…), built
  //                   from fewer distinct emoji, so the child reads the unit's
  //                   shape rather than assuming every tile is new; Easy only
  //   • ordered     — a naturally-ordered progression (counting, clock, moon,
  //                   rotation, growth) the child extends FORWARD instead of
  //                   detecting a loop; Normal only
  //   • shape       — procedurally-drawn stars/polygons/dots whose COUNT follows
  //                   a rule that need not be linear (grow, shrink, repeat, or
  //                   an alternating step like +2/−1); Hard only (design ask:
  //                   "more different patterns and visualisations") — every
  //                   Hard round is this kind, no emoji patterns at Hard at all
  // Which kinds a tier draws from IS the difficulty ramp: each kind belongs to
  // exactly one tier except `cycle` (Easy+Normal) — no new level, no new toggle
  // (design principles 8 & 9).
  generateRound() {
    const cfg = CONFIG.sizes[this.size];
    const kind = cfg.kinds[Math.floor(Math.random() * cfg.kinds.length)];
    const built = this.buildRound(kind, cfg);
    this.sequence = built.sequence;
    this.answers = built.answers;
    this.guesses = built.answers.length;
    this.stepOptions = this.answers.map(a => this.buildOptions(built.optionPool, a, cfg.options));
    this.step = 0;
  },

  buildRound(kind, cfg) {
    if (kind === 'structured') return this.buildStructured(cfg);
    if (kind === 'shape')      return this.buildShape(cfg);
    if (kind === 'ordered')    return this.buildOrdered(cfg);
    return this.buildCycle(cfg);
  },

  randomTheme() { return this.shuffle(PATTERN_SETS[Math.floor(Math.random() * PATTERN_SETS.length)]); },

  // A straight repeating loop of `period` distinct emoji (the original round
  // shape). Cycle members lead the option pool (they appeared in the sequence,
  // so they're the more plausible distractor), then the rest of the theme.
  buildCycle(cfg) {
    const { seqLength, period, guesses } = cfg;
    const theme = this.randomTheme();
    const cycle = theme.slice(0, period);
    const sequence = [];
    for (let i = 0; i < seqLength; i++) sequence.push(cycle[i % period]);
    const answers = [];
    for (let g = 0; g < guesses; g++) answers.push(cycle[(seqLength + g) % period]);
    return { sequence, answers, optionPool: [...cycle, ...theme.filter(e => !cycle.includes(e))] };
  },

  // A repeat UNIT with internal structure (e.g. 🍎🍎🍌 🍎🍎🍌). A SHAPES_3
  // template maps its distinct letters to distinct theme emoji, so a member
  // repeats WITHIN the unit — the child can't just pick the "next unused"
  // emoji, they must read the unit's shape. Easy-only, so `period` is always 3.
  buildStructured(cfg) {
    const { seqLength, period, guesses } = cfg;
    const theme = this.randomTheme();
    const shape = SHAPES_3[Math.floor(Math.random() * SHAPES_3.length)].split('');
    const map = {};
    [...new Set(shape)].forEach((letter, i) => { map[letter] = theme[i]; });
    const unit = shape.map(letter => map[letter]);   // length === period
    const sequence = [];
    for (let i = 0; i < seqLength; i++) sequence.push(unit[i % period]);
    const answers = [];
    for (let g = 0; g < guesses; g++) answers.push(unit[(seqLength + g) % period]);
    const used = [...new Set(unit)];
    return { sequence, answers, optionPool: [...used, ...theme.filter(e => !used.includes(e))] };
  },

  // Hard-only PROCEDURAL SHAPE progression (the "star with different edge
  // counts" ask). One shape family (stars / polygons / dots) is chosen and the
  // varying attribute is a COUNT that follows a rule which need NOT be linear:
  //   grow      count up by 1 or 2      (4,5,6,7 → 8)
  //   shrink    count down by 1         (8,7,6,5 → 4)
  //   cycle     a repeating value list  (4,7,4,7 → 4)
  //   alternate two steps applied in turn, e.g. +2 then −1 (4,6,5,7 → 6) — the
  //             genuinely tricky, non-additive case the user asked for
  // shapeValues() generates a run that is guaranteed in-range for every shown
  // term AND the answer; distractors are OTHER in-range counts of the same
  // family (nearest first), so options are visually comparable (same shape,
  // different count) and exactly one is correct by construction.
  buildShape(cfg) {
    const families = ['star', 'poly', 'dots'];
    const rules = ['grow', 'shrink', 'cycle', 'alternate'];
    const SHOWN = 4;   // terms shown before the "?" (enough to see an alternation repeat)
    const family = families[Math.floor(Math.random() * families.length)];
    const [min, max] = SHAPE_FAMILIES[family];
    const tok = (v) => `shape:${family}:${v}`;

    let run = null;
    for (let attempt = 0; attempt < 60 && !run; attempt++) {
      const rule = rules[Math.floor(Math.random() * rules.length)];
      run = this.shapeValues(rule, min, max, SHOWN + 1);
    }
    // Deterministic fallback (a plain count-up always fits every family range).
    if (!run) { run = []; for (let i = 0; i <= SHOWN; i++) run.push(min + i); }

    const answer = run[SHOWN];
    const sequence = run.slice(0, SHOWN).map(tok);

    // Distractors: expand outward from the answer until we have enough distinct
    // in-range counts (nearest values first → visually hardest to tell apart).
    const need = cfg.options - 1;
    const distract = [];
    for (let d = 1; distract.length < need && d <= (max - min); d++) {
      for (const v of [answer - d, answer + d]) {
        if (v >= min && v <= max && v !== answer && !distract.includes(v)) distract.push(v);
      }
    }
    return { sequence, answers: [tok(answer)], optionPool: [tok(answer), ...distract.map(tok)] };
  },

  // Build a length-`len` run of integer counts, all within [min,max], for the
  // given rule — or null if this rule can't fit the family's range (the caller
  // just retries with another rule). The last element is the answer.
  shapeValues(rule, min, max, len) {
    const range = max - min;
    const rnd = (lo, hi) => lo + Math.floor(Math.random() * (hi - lo + 1));

    if (rule === 'grow' || rule === 'shrink') {
      const step = rule === 'grow' ? (Math.random() < 0.5 ? 1 : 2) : -1;
      const span = Math.abs(step) * (len - 1);
      if (span > range) return null;                     // won't fit — retry
      const start = step > 0 ? rnd(min, max - span) : rnd(min + span, max);
      return Array.from({ length: len }, (_, i) => start + step * i);
    }

    if (rule === 'alternate') {
      // Two DIFFERENT steps applied in turn (net non-zero, so it never
      // degenerates into a plain arithmetic run). Collect every start that
      // keeps the whole run in range, then pick one at random.
      const combos = [[2, -1], [-1, 2], [3, -1], [-2, 1]];
      const [s1, s2] = combos[Math.floor(Math.random() * combos.length)];
      const starts = [];
      for (let s = min; s <= max; s++) {
        const out = [s];
        let v = s, ok = true;
        for (let i = 1; i < len; i++) {
          v += (i % 2 === 1) ? s1 : s2;
          if (v < min || v > max) { ok = false; break; }
          out.push(v);
        }
        if (ok) starts.push(out);
      }
      return starts.length ? starts[Math.floor(Math.random() * starts.length)] : null;
    }

    if (rule === 'cycle') {
      const period = Math.random() < 0.5 ? 2 : 3;
      if (range + 1 < period) return null;               // not enough distinct values
      const vals = this.shuffle(Array.from({ length: range + 1 }, (_, k) => k + min)).slice(0, period);
      return Array.from({ length: len }, (_, i) => vals[i % period]);
    }

    return null;
  },

  // ── Shape rendering ───────────────────────────────────────────────────
  // A "shape:family:n" token → inline SVG; anything else → its emoji text.
  // renderItem() is the single dispatch used by every tile-render path.
  renderItem(el, item) {
    if (typeof item === 'string' && item.startsWith('shape:')) {
      el.innerHTML = this.shapeSVG(item);
    } else {
      el.textContent = item;
    }
  },

  // Names a token for screen readers (its SVG carries no readable text); a
  // non-shape item is its own emoji, unchanged.
  describe(item) {
    if (typeof item === 'string' && item.startsWith('shape:')) {
      const [, family, nStr] = item.split(':');
      const n = parseInt(nStr, 10);
      if (family === 'dots') return n === 1 ? '1 dot' : n + ' dots';
      if (family === 'poly') return POLY_NAMES[n] || (n + '-sided shape');
      return n + '-pointed star';
    }
    return item;
  },

  shapeSVG(token) {
    const [, family, nStr] = token.split(':');
    const n = parseInt(nStr, 10);
    if (family === 'dots') return this.dotsSVG(n);
    const pts = family === 'star' ? this.starPoints(n, 44, 18) : this.polyPoints(n, 42);
    return `<svg viewBox="0 0 100 100" aria-hidden="true"><polygon class="shp" points="${pts}"/></svg>`;
  },

  // Regular n-gon vertices around centre (50,50), first vertex pointing up.
  polyPoints(n, r) {
    const pts = [];
    for (let i = 0; i < n; i++) {
      const a = (-90 + i * 360 / n) * Math.PI / 180;
      pts.push((50 + r * Math.cos(a)).toFixed(1) + ',' + (50 + r * Math.sin(a)).toFixed(1));
    }
    return pts.join(' ');
  },

  // n-pointed star: 2n vertices alternating outer radius R / inner radius r,
  // first (outer) point up.
  starPoints(n, R, r) {
    const pts = [];
    for (let i = 0; i < 2 * n; i++) {
      const rad = i % 2 === 0 ? R : r;
      const a = (-90 + i * 180 / n) * Math.PI / 180;
      pts.push((50 + rad * Math.cos(a)).toFixed(1) + ',' + (50 + rad * Math.sin(a)).toFixed(1));
    }
    return pts.join(' ');
  },

  // n dots (1-6, capped by SHAPE_FAMILIES.dots) drawn as an authentic
  // six-sided-die face, not an auto-wrapping grid — DICE_FACES picks which of
  // the 3×3 grid's named positions get a pip, so "3 dots" reads exactly like
  // the 3 on a real die, not 3 dots in a row.
  dotsSVG(n) {
    const rad = 9;
    const circles = DICE_FACES[n].map((key) => {
      const [cx, cy] = DICE_POS[key];
      return `<circle class="shp" cx="${cx}" cy="${cy}" r="${rad}"/>`;
    }).join('');
    return `<svg viewBox="0 0 100 100" aria-hidden="true">${circles}</svg>`;
  },

  // A naturally-ordered progression the child extends forward (counting, clock,
  // moon, rotation, growth). Cyclic sets wrap; bounded sets pick a start that
  // keeps the shown window plus the answers in range. A progression reads
  // clearly in a few steps, so it caps its shown length (MAX_SHOWN) rather than
  // using the tier's full seqLength. Distractors are other members of the same
  // ordered set. `eligible` guarantees enough members for the option count and
  // for a legible ≥MIN_SHOWN window given this tier's guess count.
  buildOrdered(cfg) {
    const { seqLength, options, guesses } = cfg;
    const MAX_SHOWN = 6, MIN_SHOWN = 3;
    const eligible = ORDERED_SETS.filter(s => s.items.length >= options &&
      (s.cyclic ? s.items.length > MIN_SHOWN : s.items.length - guesses >= MIN_SHOWN));
    const set = eligible[Math.floor(Math.random() * eligible.length)];
    const n = set.items.length;
    let shown = Math.min(seqLength, MAX_SHOWN, set.cyclic ? n - 1 : n - guesses);
    shown = Math.max(shown, MIN_SHOWN);
    const start = set.cyclic
      ? Math.floor(Math.random() * n)
      : Math.floor(Math.random() * (n - shown - guesses + 1));
    const at = (idx) => set.cyclic ? set.items[(start + idx) % n] : set.items[start + idx];
    const sequence = [];
    for (let i = 0; i < shown; i++) sequence.push(at(i));
    const answers = [];
    for (let g = 0; g < guesses; g++) answers.push(at(shown + g));
    return { sequence, answers, optionPool: set.items.slice() };
  },

  // Assemble one hidden position's answer choices: the correct emoji plus
  // `count - 1` distractors from the builder-supplied pool (relevant emoji —
  // same theme, cycle, or ordered set), all shuffled.
  buildOptions(pool, correct, count) {
    const distractors = this.shuffle(pool.filter(e => e !== correct)).slice(0, count - 1);
    return this.shuffle([correct, ...distractors]);
  },

  newGame(animated) {
    this.gameId++;
    this.won = false;
    this.solved = 0;
    this.answersFound = [];
    this.resolving = false;
    this.rejecting = false;
    this.winOverlay.classList.remove('show');
    Modal.close();
    if (animated) this.audioSwoosh();
    this.renderPips();
    this.nextRound(animated);
  },

  nextRound(animated) {
    this.resolving = false;
    this.generateRound();
    this.renderSequence(animated);
    this.renderStepOptions(animated);
    this.updateStatus('What comes next?');
  },

  renderPips() {
    this.pipsEl.innerHTML = '';
    for (let i = 0; i < CONFIG.roundsPerSet; i++) {
      const pip = document.createElement('div');
      pip.className = 'pip' + (i < this.solved ? ' filled' : '');
      this.pipsEl.appendChild(pip);
    }
    this.pipsEl.setAttribute('aria-label', `${this.solved} of ${CONFIG.roundsPerSet} found`);
  },

  // #sequence tiles are non-interactive (never tappable), so a screen reader
  // user has no way to inspect them unless the container's aria-label spells
  // out the pattern itself. Each item is rendered through renderItem() so a
  // shape token becomes SVG; every round has exactly one blank "?" tile.
  renderSequence(animated) {
    this.sequenceEl.setAttribute('aria-label',
      'Pattern: ' + this.sequence.map(it => this.describe(it)).join(', ') + ', then what comes next?');
    this.sequenceEl.innerHTML = '';
    this.sequence.forEach((emoji, i) => {
      const div = document.createElement('div');
      div.className = 'seq-tile' + (animated ? ' deal' : '');
      this.renderItem(div, emoji);
      if (animated) {
        div.style.animationDelay = (i * 45) + 'ms';
        div.addEventListener('animationend', () => div.classList.remove('deal'), { once: true });
      }
      this.sequenceEl.appendChild(div);
    });

    this.blankTiles = [];
    for (let g = 0; g < this.guesses; g++) {
      const blank = document.createElement('div');
      blank.className = 'seq-tile blank' + (animated ? ' deal' : '');
      blank.textContent = '❓';
      if (animated) {
        blank.style.animationDelay = ((this.sequence.length + g) * 45) + 'ms';
        blank.addEventListener('animationend', () => blank.classList.remove('deal'), { once: true });
      }
      this.sequenceEl.appendChild(blank);
      this.blankTiles.push(blank);
    }
  },

  // Renders the hidden position's answer choices (stepOptions[step]; step is
  // always 0 now that every round has one blank). Kept as an array so the
  // render path stays uniform.
  renderStepOptions(animated) {
    this.options = this.stepOptions[this.step];
    this.optionsEl.classList.remove('resolved');
    this.optionsEl.innerHTML = '';
    this.options.forEach((emoji, i) => {
      const btn = document.createElement('button');
      btn.className = 'tile' + (animated ? ' deal' : '');
      btn.dataset.index = i;
      this.renderItem(btn, emoji);
      // Shapes have no readable glyph, so name them; emoji tiles stay generic
      // ("Option N") so the emoji itself isn't spoken away before the child taps.
      const isShape = typeof emoji === 'string' && emoji.startsWith('shape:');
      btn.setAttribute('aria-label', isShape ? this.describe(emoji) : 'Option ' + (i + 1));
      if (animated) {
        btn.style.animationDelay = (i * 45) + 'ms';
        // .deal and .wrong/.correct share the same CSS specificity (two
        // classes each); leaving .deal on the tile after its pop-in
        // finishes lets it silently win the "animation" property tie by
        // source order, so the reject/celebrate keyframes never actually
        // run. Strip it the moment its own animation is done.
        btn.addEventListener('animationend', () => btn.classList.remove('deal'), { once: true });
      }
      this.optionsEl.appendChild(btn);
    });
  },

  pickAnswer(i) {
    if (this.won || this.resolving || this.rejecting) return;

    const tile = this.optionsEl.querySelector(`.tile[data-index="${i}"]`);
    if (!tile) return;
    const picked = this.options[i];
    const correct = this.answers[this.step];

    if (picked === correct) {
      // Correct — reveal the "?" slot as the real answer (an emoji or a shape,
      // via renderItem), fade the other options, fill a pip, then advance the
      // round or celebrate. Every round now has exactly one hidden position.
      this.resolving = true;
      this.audioRight();
      tile.classList.add('correct');
      this.optionsEl.classList.add('resolved');
      const blank = this.blankTiles[this.step];
      this.renderItem(blank, correct);
      blank.classList.remove('blank');
      blank.classList.add('revealed');

      this.solved++;
      this.answersFound.push(...this.answers);
      this.renderPips();
      this.updateStatus('Yes! That comes next.');
      const gen = this.gameId;
      setTimeout(() => {
        if (gen !== this.gameId) return;   // a new game replaced this round
        if (this.solved >= CONFIG.roundsPerSet) {
          this.celebrate();
        } else {
          this.nextRound(true);
        }
      }, CONFIG.advanceMs);
    } else {
      // Wrong — gentle "hmm" + a shake, a red flash, and a short buzz, no
      // penalty. Expected guessing, not a rule violation, so never the harsh
      // buzz sound (design principle 3); the tile settles back to neutral.
      // Input is locked for the animation's duration so rapid repeat-tapping
      // ("tap spam") can't sneak a pick in — on this tile or any other,
      // including the correct one — while the reject cue is still playing.
      this.rejecting = true;
      this.audioOops();
      if (navigator.vibrate) navigator.vibrate(60);
      tile.classList.remove('wrong');
      void tile.offsetWidth;   // reflow so the animation can re-run
      tile.classList.add('wrong');
      this.updateStatus('Not that one. Try again!');

      const gen = this.gameId;
      setTimeout(() => {
        if (gen !== this.gameId) return;   // a new game replaced this round
        this.rejecting = false;
      }, CONFIG.wrongHoldMs);
    }
  },

  celebrate() {
    this.won = true;
    const tier = CONFIG.celebrationTiers[Object.keys(CONFIG.sizes).indexOf(this.size)];
    this.audioWin(tier.notes);
    this.updateStatus('You found the pattern every time! Hooray!');
    this.renderWinEmojis();
    this.revealAnswersOnSequence();
    this.winOverlay.classList.add('show');
    Modal.open(this.winOverlay, () => this.newGame(true));
    for (let i = 0; i < tier.confetti; i++) {
      const conf = document.createElement('div');
      conf.className = 'confetti';
      conf.style.left = Math.random() * 100 + 'vw';
      conf.style.background = CONFIG.palette[Math.floor(Math.random() * CONFIG.palette.length)];
      conf.style.width = (6 + Math.random() * 8) + 'px';
      conf.style.height = (6 + Math.random() * 8) + 'px';
      conf.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      conf.style.animationDelay = (Math.random() * 0.8) + 's';
      document.body.appendChild(conf);
      setTimeout(() => conf.remove(), 4500);
    }
  },

  renderWinEmojis() {
    const row = document.getElementById('emoji-row');
    const set = this.emojiSets[Math.floor(Math.random() * this.emojiSets.length)];
    row.innerHTML = set.map(e => `<button>${e}</button>`).join('');
    // Poking a celebration emoji wiggles it and chirps — a tiny toy.
    row.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
      btn.classList.remove('wiggle');
      void btn.offsetWidth;
      btn.classList.add('wiggle');
      this.audioEmoji();
    }));
  },

  // Recap of the set's correct answers, shown by repopulating the real
  // #sequence (same .seq-tile look) rather than a separate strip — the
  // "answers" land where the game was actually played, staggered in like a
  // fresh deal (mirrors Odd One Out's revealOddsOnBoard()). Plain
  // non-interactive divs, not buttons — there's no tap action to offer here.
  revealAnswersOnSequence() {
    this.sequenceEl.setAttribute('aria-label', 'What you guessed each round');
    this.sequenceEl.innerHTML = '';
    this.answersFound.forEach((emoji, i) => {
      const div = document.createElement('div');
      div.className = 'seq-tile deal recap';
      this.renderItem(div, emoji);
      div.style.animationDelay = (i * 45) + 'ms';
      div.addEventListener('animationend', () => div.classList.remove('deal'), { once: true });
      this.sequenceEl.appendChild(div);
    });
    this.optionsEl.innerHTML = '';
    this.optionsEl.classList.remove('resolved');
  },

  openSettings() { this.settingsOverlay.classList.add('show'); this.updateSizeButtons(); Modal.open(this.settingsOverlay, () => this.closeSettings()); },
  closeSettings() { this.settingsOverlay.classList.remove('show'); Modal.close(); },

  openTutorial() { this.tutorialOverlay.classList.add('show'); Modal.open(this.tutorialOverlay, () => this.closeTutorial()); },
  closeTutorial() { this.tutorialOverlay.classList.remove('show'); Modal.close(); },

  setSize(size) {
    if (size === this.size) { this.closeSettings(); return; }
    this.size = size;
    this.updateSizeButtons();
    // Close first so the re-deal is visible, never a silent reset behind the
    // overlay (design principle 9).
    this.closeSettings();
    this.newGame(true);
  },

  updateSizeButtons() {
    this.settingsOverlay.querySelectorAll('.size-btn').forEach(btn => {
      const active = btn.dataset.size === this.size;
      btn.classList.toggle('active', active);
      btn.setAttribute('aria-checked', active ? 'true' : 'false');
    });
  },

  updateStatus(msg) { this.status.textContent = msg; },

  setupPWA() {
    // The whole toybox is one PWA: a single shared manifest
    // (../manifest.webmanifest, linked in <head>) and one root-scoped
    // service worker. Browsers reject blob:/data: worker scripts and
    // file:// has no SW support, so register only over http(s).
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      navigator.serviceWorker.register('../sw.js').then((root) => {
        // Drop any old per-game worker from before unification so the one
        // root worker controls this page (longest scope wins).
        navigator.serviceWorker.getRegistrations().then((regs) =>
          regs.forEach((r) => {
            if (r !== root && r.scope.startsWith(root.scope) && r.scope !== root.scope) r.unregister();
          })
        );
      }).catch(() => {});
    }
  },

  ensureAudio() {
    if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
  },

  playTone({ type = 'sine', freq = 440, duration = 100, startGain = 0.0001, peakGain = 0.15 }) {
    this.ensureAudio();
    const ctx = this.audioCtx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(startGain, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(peakGain, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration / 1000);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration / 1000 + 0.02);
  },

  audioRight() {
    // Rising two-note chime for a correct guess.
    this.playTone({ type: 'sine', freq: 660, duration: 90, peakGain: 0.16 });
    setTimeout(() => this.playTone({ type: 'sine', freq: 990, duration: 110, peakGain: 0.14 }), 90);
  },

  // Gentle "hmm", not a punitive buzz (design principle 3).
  audioOops() { this.playTone({ type: 'sine', freq: 240, duration: 160, peakGain: 0.1 }); },

  audioEmoji() {
    const freq = [523, 587, 659, 784, 880][Math.floor(Math.random() * 5)]; // pentatonic chirp
    this.playTone({ type: 'sine', freq, duration: 140, peakGain: 0.15 });
  },

  audioSwoosh() {
    this.ensureAudio();
    const ctx = this.audioCtx;
    const bufferSize = ctx.sampleRate * 0.1;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);
    src.connect(gain).connect(ctx.destination);
    src.start();
  },

  audioWin(notes) {
    notes.forEach((freq, i) => {   // C-E-G major arpeggio, extended at higher difficulty
      setTimeout(() => this.playTone({ type: 'sine', freq, duration: 220, peakGain: 0.18 }), i * 180);
    });
  }
};

App.init();
</script>
</body>
</html>
