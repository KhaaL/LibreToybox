<!DOCTYPE html>
<!-- LibreToybox — What Comes Next? · Licensed under the GNU GPL v3.0; see ../LICENSE -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Comes Next?</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪁</text></svg>" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <meta name="theme-color" content="#5B6FD8" />
  <style>
    :root {
      --bg1: #F2F2FF;
      --bg2: #DEE2FF;
      --accent: #5B6FD8;
      --border: #C7CBF2;
      --text: #35335F;
      --shadow: #BEC3EA;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; }
    /* Own background on html stops the body gradient propagating into
       overscroll, where it would tile and show the wrong end of the gradient. */
    html { background: var(--bg1); }
    body {
      font-family: ui-rounded, 'Hiragino Maru Gothic ProN', Quicksand, Comfortaa, 'Arial Rounded MT Bold', 'Varela Round', Calibri, sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100%;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }

    header {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 6px;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .logo { display: flex; align-items: center; }
    .top-btns { display: flex; gap: 8px; }
    .top-btn {
      position: relative;
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 3px 0 var(--shadow);
      transition: transform .05s;
      min-width: 48px;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: inherit;
    }
    .top-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--shadow); }
    /* New Game requires a deliberate hold, not a quick tap, so an accidental
       tap can't silently wipe progress. */
    .hold-progress { position: absolute; inset: 5px; border-radius: 50%; pointer-events: none; opacity: 0; transition: opacity .1s; }
    .top-btn.holding .hold-progress { opacity: 1; }

    main { width: 100%; max-width: 420px; padding: 8px 16px 18px; display: flex; flex-direction: column; align-items: center; gap: 18px; }

    /* Visually hidden but available to screen readers (aria-live announcements
       still fire). Standard clip-based sr-only pattern. */
    .status { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); clip-path: inset(50%); white-space: nowrap; border: 0; }

    /* Progress pips — one per round in a set, filled as rounds are solved.
       Visual only (no numbers), design principle 1. */
    #pips { display: flex; gap: 10px; margin-top: 4px; }
    .pip {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--border);
      transition: background .2s, transform .2s;
    }
    .pip.filled { background: var(--accent); border-color: var(--accent); transform: scale(1.1); }

    /* The pattern strip is display-only, never tapped — like Shape Fit's board
       cells vs. its draggable pieces, these tiles are exempt from the ≥60px
       interactive-target rule (principle 4 covers TAP targets) so an 8-item
       Hard sequence can still wrap cleanly on a phone width. */
    #sequence {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .seq-tile {
      flex: 0 0 auto;
      width: 54px;
      height: 54px;
      background: #fff;
      border: 3px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 3px 0 var(--shadow);
      font-size: 1.8rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* The mystery slot — dashed border + accent tint marks it as "not yet
       known" until a correct pick resolves it into the real answer. */
    .seq-tile.blank { border-style: dashed; background: var(--bg2); color: var(--accent); font-size: 1.5rem; }
    /* Not clickable (win-screen recap only), so no pointer cursor. */
    .seq-tile.recap { cursor: default; }

    /* The answer options — real, tappable ≥60px tiles, same look/feel/
       animation classes as every other guessing game in the suite. */
    #options {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .tile {
      width: 72px;
      height: 72px;
      background: #fff;
      border: 3px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 4px 0 var(--shadow);
      font-size: clamp(2rem, 10vw, 2.6rem);
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      transition: transform .08s, box-shadow .08s, opacity .25s;
    }
    .tile:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--shadow); }
    .tile:focus-visible { outline: 4px solid var(--accent); outline-offset: -4px; }
    /* .deal is declared before .correct/.wrong/.revealed on purpose: it shares
       their exact specificity (two classes each), and a tile can still be
       mid-deal when it's tapped. With equal specificity the LATER rule wins
       the "animation" property outright, so those must come after .deal in
       source order to reliably override its pop-in the instant either class
       is added — not just once .deal's own animationend fires (see the
       JS-side .deal cleanup for the belt-and-braces half of this fix). */
    @keyframes pop-in { 0% { transform: scale(0.4); opacity: 0; } 60% { transform: scale(1.12); opacity: 1; } 100% { transform: scale(1); } }
    .seq-tile.deal, .tile.deal { animation: pop-in .35s ease-out both; }
    .seq-tile.revealed { animation: pop .5s ease-out; }
    .tile.correct { animation: pop .5s ease-out; }
    /* Wrong tap = shake + a red flash (the suite's shared "wrong" cue, e.g.
       Sudoku's .conflict) so it's unmissable but still non-punitive — the
       tile settles straight back to neutral (design principle 3). */
    .tile.wrong { animation: shake .4s ease, wrongFlash .5s ease; }
    /* When a correct pick resolves, the other options gently fade back. */
    #options.resolved .tile:not(.correct) { opacity: 0.35; }

    /* Build mode (Hard): #sequence's trailing "?" tiles become tappable slots
       (faint "+" until filled), and #options holds a palette + a ✓ confirm
       instead of answer options. A wrong slot on ✓ gets the shared shake/flash
       (kept editable, principle 3). */
    .seq-tile.slot { cursor: pointer; font-family: inherit; padding: 0; color: var(--border); -webkit-appearance: none; appearance: none; }
    .seq-tile.slot.filled { color: var(--text); background: var(--bg2); border-style: solid; font-size: 1.8rem; }
    .seq-tile.slot:focus-visible { outline: 4px solid var(--accent); outline-offset: -4px; }
    .seq-tile.wrong { animation: shake .4s ease, wrongFlash .5s ease; }
    .tile.confirm { background: #43A047; border-color: #2E7D32; color: #fff; }
    .tile.confirm:disabled { opacity: 0.4; cursor: default; }
    .tile.confirm:disabled:active { transform: none; box-shadow: 0 4px 0 var(--shadow); }

    @keyframes pop { 0% { transform: scale(1); } 45% { transform: scale(1.25); } 100% { transform: scale(1); } }
    @keyframes shake { 0%,100% { transform: translateX(0); } 15% { transform: translateX(-9px); } 30% { transform: translateX(9px); } 45% { transform: translateX(-7px); } 60% { transform: translateX(7px); } 75% { transform: translateX(-4px); } }
    @keyframes wrongFlash { 0%,100% { border-color: var(--border); background: #fff; } 20%,65% { border-color: #E53935; background: #FFCDD2; } }
    @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
    @keyframes wiggle { 0%, 100% { transform: rotate(0) scale(1); } 25% { transform: rotate(-12deg) scale(1.25); } 55% { transform: rotate(9deg) scale(1.12); } 80% { transform: rotate(-4deg) scale(1.04); } }

    .overlay {
      position: fixed; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; text-align: center; padding: 20px;
    }
    .overlay.show { display: flex; }
    #win-overlay { background: rgba(255,255,255,0.55); justify-content: flex-end; padding-bottom: 12vh; }
    #settings-overlay { background: rgba(255,255,255,0.92); }

    .emoji-row { font-size: 4.5rem; display: flex; gap: 18px; margin-bottom: 22px; }
    .emoji-row button { background: none; border: none; padding: 0; font: inherit; cursor: pointer; animation: pop-in .6s ease-out both; }
    .emoji-row button:nth-child(2) { animation-delay: .15s; }
    .emoji-row button:nth-child(3) { animation-delay: .3s; }
    .emoji-row button:focus-visible { outline: 3px solid var(--text); outline-offset: 2px; border-radius: 12px; }
    .emoji-row button.wiggle { animation: wiggle .5s ease; }

    .settings-card {
      background: #fff; border: 3px solid var(--border); border-radius: 18px;
      padding: 22px 26px; box-shadow: 0 10px 28px rgba(0,0,0,0.15);
      display: flex; flex-direction: column; align-items: center; gap: 14px; min-width: 260px;
    }
    .settings-card h2 { margin: 0; font-size: 2rem; }
    .size-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 18px; max-width: 252px; }
    .size-btn {
      width: 72px; height: 72px; border: 2px solid var(--border); border-radius: 16px;
      background: #fff; font-family: inherit; font-size: 1.7rem; cursor: pointer;
      box-shadow: 0 4px 0 var(--shadow); transition: transform .05s;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; color: var(--text);
    }
    .size-btn small { font-size: 0.72rem; }
    .size-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--shadow); }
    .size-btn.active { box-shadow: 0 0 0 4px var(--accent), 0 4px 0 var(--shadow); }

    .confetti { position: fixed; top: 0; left: 0; width: 10px; height: 10px; pointer-events: none; z-index: 101; animation: fall linear forwards; }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <a class="top-btn" id="back-btn" href="../index.html" aria-label="Back to LibreToybox home">🏠</a>
      <div class="logo" role="img" aria-label="What Comes Next?" title="What Comes Next?">
        <svg viewBox="0 0 48 48" width="40" height="40" aria-hidden="true">
          <circle cx="8" cy="24" r="6" fill="#8ED3F4" stroke="#54A6D2" stroke-width="2"/>
          <circle cx="24" cy="24" r="6" fill="#FFE66D" stroke="#DCBC2E" stroke-width="2"/>
          <circle cx="40" cy="24" r="7" fill="none" stroke="#5B6FD8" stroke-width="3" stroke-dasharray="4 3"/>
          <text x="40" y="28.5" font-size="12" text-anchor="middle" fill="#5B6FD8" font-family="ui-rounded, sans-serif" font-weight="bold">?</text>
        </svg>
      </div>
    </div>
    <div class="top-btns">
      <button class="top-btn" id="new-game" aria-label="New Game">🔄<span class="hold-progress" aria-hidden="true"></span></button>
      <button class="top-btn" id="settings-btn" aria-label="Settings">⚙️</button>
    </div>
  </header>

  <main>
    <div class="status" id="status" aria-live="polite"></div>
    <div id="pips" role="img" aria-label="Progress"></div>
    <div id="sequence" role="img" aria-label="Pattern"></div>
    <div id="options" role="group" aria-label="Which comes next?"></div>
  </main>

  <div class="overlay" id="win-overlay" role="dialog" aria-modal="true" aria-label="You won">
    <div class="emoji-row" id="emoji-row"></div>
    <div class="top-btns">
      <a class="top-btn" id="win-home-btn" href="../index.html" aria-label="Back to LibreToybox home">🏠</a>
      <button class="top-btn" id="play-again" aria-label="Play Again">🔄</button>
    </div>
  </div>

  <div class="overlay" id="settings-overlay" role="dialog" aria-modal="true" aria-label="Settings">
    <div class="settings-card">
      <h2>⚙️</h2>
      <div class="size-row" role="radiogroup" aria-label="Difficulty">
        <button class="size-btn" data-size="easy"   role="radio" aria-label="Easy, find the one missing tile">🐣<small>1</small></button>
        <button class="size-btn" data-size="medium" role="radio" aria-label="Normal, fill in two gaps">🕊️<small>2</small></button>
        <button class="size-btn" data-size="hard"   role="radio" aria-label="Hard, build the next three tiles">🦅<small>3</small></button>
      </div>
      <button class="top-btn" id="close-settings" aria-label="Close">✕</button>
    </div>
  </div>

<script>
// Small, mutually-independent thematic sets. Each round picks ONE set, so
// overlap between sets (e.g. ⭐ appearing in both "shapes" and "sky") is
// harmless — only one set is ever in play at a time. Every set needs at
// least period(3) + decoys(1) = 4 distinct members; 5 gives headroom.
const PATTERN_SETS = [
  ['☀️','🌧️','⛈️','❄️','🌈'],   // weather
  ['🔴','🔺','🟦','⭐','🟣'],   // shapes
  ['🍎','🍌','🍇','🍊','🍓'],   // fruit
  ['🐱','🐶','🐰','🐻','🦊'],   // animals
  ['🌙','⭐','☁️','🌈','☀️'],   // sky
  ['🐠','🐳','🦀','🐙','🦐'],   // sea
];

// Naturally-ordered progressions the child extends FORWARD (not a loop to
// spot). `cyclic` sets wrap around (clock, moon, rotation); the rest are
// bounded, so buildOrdered() only starts where the shown window + the answers
// stay in range. Each is visually self-evident (a filling moon, an advancing
// clock hand, counting up) so no reading is required (design principle 1).
const ORDERED_SETS = [
  { cyclic: false, items: ['1️⃣','2️⃣','3️⃣','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣'] }, // counting up
  { cyclic: true,  items: ['🕐','🕑','🕒','🕓','🕔','🕕','🕖','🕗','🕘','🕙','🕚','🕛'] }, // clock hours
  { cyclic: true,  items: ['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'] }, // moon phases
  { cyclic: true,  items: ['⬆️','➡️','⬇️','⬅️'] }, // rotating clockwise
  { cyclic: false, items: ['🥚','🐣','🐤','🐔'] }, // chick growing up
];

// Structured repeat-unit templates, keyed by unit length. A letter maps to a
// distinct emoji, so a unit like 'AAB' repeats a member WITHIN the unit — the
// child reads the unit's SHAPE instead of assuming every tile is a new emoji.
// None is a shorter cycle in disguise (e.g. no 'ABAB'), so each is genuinely
// structured, not just a smaller period.
const SHAPES = {
  3: ['AAB', 'ABB', 'ABA'],
  4: ['AABB', 'AABA', 'ABBA', 'AABC', 'ABCC'],
  5: ['AABBC', 'AABCA', 'ABCBA', 'AABBA', 'ABBCC']
};

const CONFIG = {
  roundsPerSet: 5,
  advanceMs: 700,   // pause after a correct pick before the next round (gameId-guarded)
  wrongHoldMs: 500, // input lock while the reject shake/flash plays (matches wrongFlash's duration)
  // Two dials scale difficulty per tier: WHICH pattern kinds a round can draw
  // from (the `kinds` list), and HOW MUCH the child does per round (the
  // interaction). Both fold into the three tiers with no new level/toggle
  // (design principles 8 & 9), the same shape Grocery Cashier uses for its
  // per-tier flag bundles:
  //   Easy   — pick 1 answer; straight cycles + gentle ordered progressions,
  //            but with tempting near-miss distractors and the occasional
  //            interior gap, so the single tap isn't a reflex.
  //   Normal — pick 2 answers per round (one usually an interior "what's
  //            missing?" gap); adds structured repeat-shapes (AAB/ABB…).
  //   Hard   — BUILD the next 3 tiles by tapping a palette in order (a deeper
  //            "apply the rule yourself" loop than picking one option); adds
  //            interleaved two-track patterns, plus structured/ordered.
  // `blanks` = hidden positions the child fills by picking; `buildCount` = tiles
  // the child constructs; `interaction` selects the verb.
  sizes: {
    easy:   { seqLength: 6,  period: 3, options: 3, blanks: 1, interaction: 'pick',  kinds: ['cycle', 'ordered'] },                     // 🐣 (default)
    medium: { seqLength: 8,  period: 4, options: 4, blanks: 2, interaction: 'pick',  kinds: ['cycle', 'structured', 'ordered'] },       // 🕊️
    hard:   { seqLength: 10, period: 5, buildCount: 3,         interaction: 'build', kinds: ['structured', 'interleaved', 'ordered'] }  // 🦅 build the next 3
  },
  // Celebration grows with difficulty — Easy is today's unchanged baseline,
  // Normal/Hard add more confetti and extra rising notes on the same fanfare.
  celebrationTiers: [
    { confetti: 60,  notes: [523.25, 659.25, 783.99] },
    { confetti: 90,  notes: [523.25, 659.25, 783.99, 1046.50] },
    { confetti: 130, notes: [523.25, 659.25, 783.99, 1046.50, 1318.51] }
  ],
  // Canonical LibreToybox pastel palette — used for confetti (design principle 11).
  palette: ['#F7A6B9','#F9C784','#FFE66D','#A8E6CF','#8ED3F4','#C3B4F7','#FFB3A0','#C8E88A']
};

// --- Shared modal a11y helper (copied into each game — the suite ships no
// bundler). Moves focus into an opened overlay, traps Tab within it, closes on
// Escape, and restores focus to the opener on close (design principle 8). ---
const Modal = {
  opener: null, overlay: null, onDismiss: null, handler: null,
  focusable(el) {
    return [...el.querySelectorAll('a[href], button:not([disabled]), input, select, textarea, [tabindex]:not([tabindex="-1"])')]
      .filter(n => n.getClientRects().length > 0);
  },
  open(overlay, onDismiss) {
    this.opener = document.activeElement;
    this.overlay = overlay;
    this.onDismiss = onDismiss || null;
    const items = this.focusable(overlay);
    (items[0] || overlay).focus({ preventScroll: true });
    this.handler = (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        if (this.onDismiss) this.onDismiss(); else this.close();
      } else if (e.key === 'Tab') {
        const f = this.focusable(overlay);
        if (!f.length) { e.preventDefault(); return; }
        const first = f[0], last = f[f.length - 1];
        if (e.shiftKey && (document.activeElement === first || !overlay.contains(document.activeElement))) {
          e.preventDefault(); last.focus();
        } else if (!e.shiftKey && (document.activeElement === last || !overlay.contains(document.activeElement))) {
          e.preventDefault(); first.focus();
        }
      }
    };
    document.addEventListener('keydown', this.handler, true);
  },
  close() {
    if (this.handler) document.removeEventListener('keydown', this.handler, true);
    this.handler = null;
    const opener = this.opener;
    this.opener = this.overlay = this.onDismiss = null;
    if (opener && opener.focus) opener.focus({ preventScroll: true });
  }
};

const App = {
  size: 'easy',
  interaction: 'pick', // 'pick' (Easy/Normal: tap an option) or 'build' (Hard: construct the next tiles)
  cells: [],          // render list for #sequence: { blank:false, emoji } | { blank:true }
  full: [],           // full deterministic sequence (context + continuation), for reveals/near-misses
  pool: [],           // relevant emoji this round (distractor source / build-palette source)
  answers: [],        // the correct emoji for each blank, in resolve order (left→right)
  stepOptions: [],    // pick mode: per-blank answer choices, stepOptions[step]
  step: 0,            // pick mode: which blank is currently being guessed
  options: [],        // pick mode: stepOptions[step] — this step's choices, in display order
  blankTiles: [],     // the blank elements in #sequence, in resolve order (revealed as solved)
  palette: [],        // build mode: the emoji the child taps to fill the slots
  buildFilled: [],    // build mode: the emoji placed in each slot so far (null = empty)
  solved: 0,          // rounds solved in the current set
  answersFound: [],   // every correct answer from this set's solved rounds, in solve order
  resolving: false,   // true during the pause between a correct answer and the next step/round
  rejecting: false,   // true while the wrong cue plays — blocks tap-spam
  won: false,
  gameId: 0,
  audioCtx: null,

  emojiSets: [
    ['🎉', '🌟', '🏆'],
    ['🎈', '🌈', '🎊'],
    ['🥳', '✨', '🍭']
  ],

  init() {
    this.cacheDOM();
    this.bindEvents();
    this.updateSizeButtons();
    this.newGame();
    this.setupPWA();
  },

  cacheDOM() {
    this.sequenceEl = document.getElementById('sequence');
    this.optionsEl = document.getElementById('options');
    this.pipsEl = document.getElementById('pips');
    this.status = document.getElementById('status');
    this.winOverlay = document.getElementById('win-overlay');
    this.newGameBtn = document.getElementById('new-game');
    this.playAgainBtn = document.getElementById('play-again');
    this.settingsOverlay = document.getElementById('settings-overlay');
    this.settingsBtn = document.getElementById('settings-btn');
    this.closeSettingsBtn = document.getElementById('close-settings');
  },

  bindEvents() {
    this.bindNewGameHold();
    this.playAgainBtn.addEventListener('click', () => this.newGame(true));
    this.settingsBtn.addEventListener('click', () => this.openSettings());
    this.closeSettingsBtn.addEventListener('click', () => this.closeSettings());
    this.settingsOverlay.addEventListener('click', (e) => {
      if (e.target === this.settingsOverlay) this.closeSettings();
    });
    this.settingsOverlay.querySelectorAll('.size-btn').forEach(btn => {
      btn.addEventListener('click', () => this.setSize(btn.dataset.size));
    });
    // One delegated handler covers mouse, touch, pen and keyboard (real
    // <button> tiles fire click on Enter/Space too — keyboard parity, DP8).
    // #options is the answer row in pick mode, and the build palette + ✓
    // confirm in build mode; branch on the current interaction.
    this.optionsEl.addEventListener('click', (e) => {
      if (this.interaction === 'build') {
        if (e.target.closest('.confirm')) { this.checkBuild(); return; }
        const pal = e.target.closest('.palette');
        if (pal) this.placeInSlot(pal.dataset.emoji);
        return;
      }
      const tile = e.target.closest('.tile');
      if (tile) this.pickAnswer(parseInt(tile.dataset.index, 10));
    });
    // Build mode: tap a filled slot in the strip to clear it (direct-
    // manipulation undo, principle 2).
    this.sequenceEl.addEventListener('click', (e) => {
      if (this.interaction !== 'build') return;
      const slot = e.target.closest('.slot');
      if (slot) this.clearSlot(parseInt(slot.dataset.slot, 10));
    });
  },

  // New Game requires a deliberate hold, not a quick tap, so an accidental
  // tap can't silently wipe progress. A quick tap/keypress does nothing;
  // only a sustained HOLD_MS hold starts a fresh round.
  bindNewGameHold() {
    const HOLD_MS = 500;
    const btn = this.newGameBtn;
    const ring = btn.querySelector('.hold-progress');
    let timer = null, raf = null, startTime = null, startPt = null, active = false;

    const tick = () => {
      const pct = Math.min(100, ((performance.now() - startTime) / HOLD_MS) * 100);
      ring.style.background = `conic-gradient(rgba(91,111,216,0.85) ${pct}%, transparent ${pct}%)`;
      if (pct < 100) raf = requestAnimationFrame(tick);
    };
    const start = () => {
      if (active) return;
      active = true;
      startTime = performance.now();
      btn.classList.add('holding');
      tick();
      timer = setTimeout(() => {
        active = false;
        btn.classList.remove('holding');
        if (navigator.vibrate) navigator.vibrate(40);
        this.newGame(true);
      }, HOLD_MS);
    };
    const cancel = () => {
      if (!active) return;
      active = false;
      clearTimeout(timer);
      if (raf) cancelAnimationFrame(raf);
      btn.classList.remove('holding');
      ring.style.background = '';
    };

    btn.addEventListener('pointerdown', (e) => { startPt = { x: e.clientX, y: e.clientY }; start(); });
    btn.addEventListener('pointermove', (e) => {
      if (!active || !startPt) return;
      if (Math.hypot(e.clientX - startPt.x, e.clientY - startPt.y) > 10) cancel();
    });
    btn.addEventListener('pointerup', cancel);
    btn.addEventListener('pointercancel', cancel);
    btn.addEventListener('pointerleave', cancel);
    btn.addEventListener('keydown', (e) => {
      if ((e.key === 'Enter' || e.key === ' ') && !e.repeat) { e.preventDefault(); start(); }
    });
    btn.addEventListener('keyup', (e) => {
      if (e.key === 'Enter' || e.key === ' ') cancel();
    });
  },

  shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  },

  // ── Round generation ──────────────────────────────────────────────────
  // A round is built by one of several PATTERN-KIND builders, chosen per round
  // from the current tier's `kinds` list. Every builder returns
  // { full, shownLen, pool, minContext }: `full` is the DETERMINISTIC sequence
  // (visible context of length `shownLen`, then enough continuation to cover
  // this round's blanks/build slots), `pool` is the relevant emoji, and
  // `minContext` is how many tiles must precede an interior gap for it to be
  // fair. Because `full` is deterministic, every hidden position — trailing OR
  // interior — has exactly one correct value BY CONSTRUCTION. Kinds are the
  // CONTENT dial; the interaction (pick vs build) and blank count are the
  // LOOP-DEPTH dial (design principles 8 & 9):
  //   • cycle       — a straight repeating loop of distinct emoji
  //   • structured  — a repeat UNIT with internal shape (AAB/ABB/ABA…)
  //   • interleaved — two tracks woven on alternating positions (Hard/build)
  //   • ordered     — a naturally-ordered progression extended forward
  generateRound() {
    const cfg = CONFIG.sizes[this.size];
    this.interaction = cfg.interaction;
    const tail = cfg.interaction === 'build' ? cfg.buildCount : cfg.blanks;
    const kind = cfg.kinds[Math.floor(Math.random() * cfg.kinds.length)];
    const built = this.buildRound(kind, cfg, tail);
    this.full = built.full;
    this.pool = built.pool;

    // Which positions are hidden. Build: `buildCount` trailing slots. Pick: a
    // mix of interior + trailing gaps, sorted ascending so their #sequence
    // order equals their resolve order (left → right).
    const blankIdx = cfg.interaction === 'build'
      ? Array.from({ length: cfg.buildCount }, (_, j) => built.shownLen + j)
      : this.chooseBlankPositions(cfg, built.shownLen, built.minContext);
    this.hasInterior = blankIdx.some(p => p < built.shownLen);

    const blankSet = new Set(blankIdx);
    const lastPos = Math.max(built.shownLen - 1, ...blankIdx);
    this.cells = [];
    for (let p = 0; p <= lastPos; p++) {
      this.cells.push(blankSet.has(p) ? { blank: true } : { blank: false, emoji: built.full[p] });
    }
    this.answers = blankIdx.map(p => built.full[p]);
    this.step = 0;

    if (cfg.interaction === 'build') {
      this.palette = this.paletteFor(built.pool);
      this.buildFilled = this.answers.map(() => null);
    } else {
      this.stepOptions = blankIdx.map(p => {
        // Near-miss distractors: the tiles right around this gap in the full
        // sequence (the "it just showed this" trap, the off-by-one neighbour).
        // These are the most tempting wrong answers, so a correct tap needs the
        // rule — not a "which one fits the theme" guess.
        const nearMisses = [built.full[p - 1], built.full[p + 1], built.full[p - 2]];
        return this.buildOptions(built.pool, nearMisses, built.full[p], cfg.options);
      });
    }
  },

  buildRound(kind, cfg, tail) {
    if (kind === 'structured')  return this.buildStructured(cfg, tail);
    if (kind === 'interleaved') return this.buildInterleaved(cfg, tail);
    if (kind === 'ordered')     return this.buildOrdered(cfg, tail);
    return this.buildCycle(cfg, tail);
  },

  randomTheme() { return this.shuffle(PATTERN_SETS[Math.floor(Math.random() * PATTERN_SETS.length)]); },

  // A straight repeating loop of `period` distinct emoji. `full` runs
  // seqLength + tail long so trailing gaps / build slots have defined values.
  buildCycle(cfg, tail) {
    const { seqLength, period } = cfg;
    const theme = this.randomTheme();
    const cycle = theme.slice(0, period);
    const full = [];
    for (let i = 0; i < seqLength + tail; i++) full.push(cycle[i % period]);
    return { full, shownLen: seqLength, minContext: period,
             pool: [...cycle, ...theme.filter(e => !cycle.includes(e))] };
  },

  // A repeat UNIT with internal structure (e.g. 🍎🍎🍌 🍎🍎🍌). A SHAPES
  // template of length `period` maps its distinct letters to distinct theme
  // emoji, so a member repeats WITHIN the unit — the child reads the unit's
  // shape rather than assuming every tile is new.
  buildStructured(cfg, tail) {
    const { seqLength, period } = cfg;
    const theme = this.randomTheme();
    const shapes = SHAPES[period] || SHAPES[3];
    const shape = shapes[Math.floor(Math.random() * shapes.length)].split('');
    const map = {};
    [...new Set(shape)].forEach((letter, i) => { map[letter] = theme[i]; });
    const unit = shape.map(letter => map[letter]);   // length === period
    const full = [];
    for (let i = 0; i < seqLength + tail; i++) full.push(unit[i % period]);
    const used = [...new Set(unit)];
    return { full, shownLen: seqLength, minContext: period,
             pool: [...used, ...theme.filter(e => !used.includes(e))] };
  },

  // Two independent tracks woven on alternating positions — evens advance
  // through trackA, odds through trackB (from two DIFFERENT themes, no shared
  // emoji, so the streams read apart). Hard/build only, so no interior gaps —
  // minContext === full length disables them.
  buildInterleaved(cfg, tail) {
    const { seqLength } = cfg;
    const themes = this.shuffle(PATTERN_SETS);
    const trackA = this.shuffle(themes[0]).slice(0, 3);
    const trackB = this.shuffle(themes[1].filter(e => !trackA.includes(e))).slice(0, 2);
    const at = (i) => i % 2 === 0
      ? trackA[(i >> 1) % trackA.length]
      : trackB[((i - 1) >> 1) % trackB.length];
    const full = [];
    for (let i = 0; i < seqLength + tail; i++) full.push(at(i));
    return { full, shownLen: seqLength, minContext: seqLength,
             pool: [...trackA, ...trackB] };
  },

  // A naturally-ordered progression the child extends forward. Cyclic sets
  // wrap; bounded sets pick a start that keeps the window + continuation in
  // range. Shown length caps at MAX_SHOWN (a progression reads in a few steps).
  // `eligible` guarantees enough members for the options/palette and a legible
  // ≥MIN_SHOWN window given this round's `tail`.
  buildOrdered(cfg, tail) {
    const { seqLength, options } = cfg;
    const MAX_SHOWN = 6, MIN_SHOWN = 3;
    const eligible = ORDERED_SETS.filter(s => s.items.length >= (options || 4) &&
      (s.cyclic ? s.items.length > MIN_SHOWN : s.items.length - tail >= MIN_SHOWN));
    const set = eligible[Math.floor(Math.random() * eligible.length)];
    const n = set.items.length;
    let shown = Math.min(seqLength, MAX_SHOWN, set.cyclic ? n - 1 : n - tail);
    shown = Math.max(shown, MIN_SHOWN);
    const start = set.cyclic
      ? Math.floor(Math.random() * n)
      : Math.floor(Math.random() * (n - shown - tail + 1));
    const at = (idx) => set.cyclic ? set.items[(start + idx) % n] : set.items[start + idx];
    const full = [];
    for (let i = 0; i < shown + tail; i++) full.push(at(i));
    return { full, shownLen: shown, minContext: 3, pool: set.items.slice() };
  },

  // Choose the hidden positions for a PICK round: `blanks` of them, sorted
  // ascending. An interior gap needs `minContext` visible tiles before it and a
  // visible neighbour after it (index ≤ shownLen-2) so it can be read from both
  // sides; the rest are trailing. Two gaps are never adjacent.
  chooseBlankPositions(cfg, shownLen, minContext) {
    const lo = minContext, hi = shownLen - 2;
    const canInterior = hi >= lo;
    const interior = () => lo + Math.floor(Math.random() * (hi - lo + 1));
    if (cfg.blanks === 1) {
      return [(canInterior && Math.random() < 0.5) ? interior() : shownLen];
    }
    return canInterior ? [interior(), shownLen].sort((a, b) => a - b) : [shownLen, shownLen + 1];
  },

  // Build-mode palette: every distinct correct answer (so the round is always
  // buildable) plus a few extra pool emoji, capped so the palette stays small
  // enough to scan (~6 tiles), shuffled.
  paletteFor(pool) {
    const BUILD_PALETTE_MAX = 6;
    const answers = [...new Set(this.answers)];
    const extras = this.shuffle(pool.filter(e => !answers.includes(e)))
      .slice(0, Math.max(2, BUILD_PALETTE_MAX - answers.length));
    return this.shuffle([...answers, ...extras]);
  },

  // Assemble one blank's answer choices: the correct emoji, then the most
  // tempting near-misses (deduped, minus the correct one), then fill any
  // remaining slots from the pool. `count` options total, shuffled.
  buildOptions(pool, nearMisses, correct, count) {
    const chosen = [correct];
    const add = (e) => { if (e != null && !chosen.includes(e) && chosen.length < count) chosen.push(e); };
    this.shuffle(nearMisses).forEach(add);
    this.shuffle(pool).forEach(add);
    return this.shuffle(chosen);
  },

  newGame(animated) {
    this.gameId++;
    this.won = false;
    this.solved = 0;
    this.answersFound = [];
    this.resolving = false;
    this.rejecting = false;
    this.winOverlay.classList.remove('show');
    Modal.close();
    if (animated) this.audioSwoosh();
    this.renderPips();
    this.nextRound(animated);
  },

  nextRound(animated) {
    this.resolving = false;
    this.generateRound();
    this.renderSequence(animated);
    if (this.interaction === 'build') this.renderBuild(animated);
    else this.renderStepOptions(animated);
    this.updateStatus(this.promptText());
  },

  // The visible prompt (also the sr-only status). Adapts to the verb: build,
  // fill multiple gaps, complete an interior gap, or predict the next tile.
  promptText() {
    if (this.interaction === 'build') return 'Build the next ' + this.answers.length + '!';
    if (this.answers.length > 1) return 'Fill in the pattern!';
    return this.hasInterior ? "What's missing?" : 'What comes next?';
  },

  // #sequence tiles are non-focusable, so its aria-label spells out the visible
  // pattern and what's being asked for screen-reader users.
  sequenceAria() {
    const shown = this.cells.filter(c => !c.blank).map(c => c.emoji).join(', ');
    if (this.interaction === 'build') return 'Pattern: ' + shown + '. Build the next ' + this.answers.length + '.';
    const ask = this.answers.length > 1 ? ', fill in the missing tiles.'
      : (this.hasInterior ? ', what is missing?' : ', what comes next?');
    return 'Pattern: ' + shown + ask;
  },

  renderPips() {
    this.pipsEl.innerHTML = '';
    for (let i = 0; i < CONFIG.roundsPerSet; i++) {
      const pip = document.createElement('div');
      pip.className = 'pip' + (i < this.solved ? ' filled' : '');
      this.pipsEl.appendChild(pip);
    }
    this.pipsEl.setAttribute('aria-label', `${this.solved} of ${CONFIG.roundsPerSet} found`);
  },

  // Render #sequence from `this.cells`. Fixed tiles are non-interactive divs; a
  // blank is a dashed "?" — a plain div in pick mode (revealed on a correct
  // pick), or a tappable <button> "slot" in build mode (tap a palette tile to
  // fill it, tap the slot to clear it). `blankTiles` collects the blanks in
  // resolve order (== ascending position == render order).
  renderSequence(animated) {
    this.sequenceEl.setAttribute('aria-label', this.sequenceAria());
    this.sequenceEl.innerHTML = '';
    this.blankTiles = [];
    this.cells.forEach((cell, i) => {
      let el;
      if (cell.blank && this.interaction === 'build') {
        el = document.createElement('button');
        el.className = 'seq-tile blank slot';
        el.dataset.slot = this.blankTiles.length;
        el.textContent = '＋';
        el.setAttribute('aria-label', 'Empty slot ' + (this.blankTiles.length + 1) + ' — tap a tile below to fill it');
        this.blankTiles.push(el);
      } else if (cell.blank) {
        el = document.createElement('div');
        el.className = 'seq-tile blank';
        el.textContent = '❓';
        this.blankTiles.push(el);
      } else {
        el = document.createElement('div');
        el.className = 'seq-tile';
        el.textContent = cell.emoji;
      }
      if (animated) {
        el.classList.add('deal');
        el.style.animationDelay = (i * 45) + 'ms';
        el.addEventListener('animationend', () => el.classList.remove('deal'), { once: true });
      }
      this.sequenceEl.appendChild(el);
    });
  },

  // Renders the current hidden position's answer choices (stepOptions[step]).
  // At Hard, this runs a second time — once the first blank resolves — to
  // present a fresh option set for the second blank.
  renderStepOptions(animated) {
    this.options = this.stepOptions[this.step];
    this.optionsEl.classList.remove('resolved', 'build-mode');
    this.optionsEl.innerHTML = '';
    this.options.forEach((emoji, i) => {
      const btn = document.createElement('button');
      btn.className = 'tile' + (animated ? ' deal' : '');
      btn.dataset.index = i;
      btn.textContent = emoji;
      btn.setAttribute('aria-label', 'Option ' + (i + 1));
      if (animated) {
        btn.style.animationDelay = (i * 45) + 'ms';
        // .deal and .wrong/.correct share the same CSS specificity (two
        // classes each); leaving .deal on the tile after its pop-in
        // finishes lets it silently win the "animation" property tie by
        // source order, so the reject/celebrate keyframes never actually
        // run. Strip it the moment its own animation is done.
        btn.addEventListener('animationend', () => btn.classList.remove('deal'), { once: true });
      }
      this.optionsEl.appendChild(btn);
    });
  },

  // ── Build mode (Hard) ────────────────────────────────────────────────
  // The child constructs the continuation instead of picking one option:
  // #options becomes a small palette of emoji + a ✓ confirm; tapping a palette
  // tile fills the leftmost empty slot in #sequence, tapping a filled slot
  // clears it, and ✓ checks the whole build. This is a deeper "apply the rule
  // yourself" loop than recognising among given options.
  renderBuild(animated) {
    this.optionsEl.classList.remove('resolved');
    this.optionsEl.classList.add('build-mode');
    this.optionsEl.innerHTML = '';
    this.palette.forEach((emoji, i) => {
      const btn = document.createElement('button');
      btn.className = 'tile palette' + (animated ? ' deal' : '');
      btn.dataset.emoji = emoji;
      btn.textContent = emoji;
      btn.setAttribute('aria-label', 'Place tile ' + (i + 1));
      if (animated) {
        btn.style.animationDelay = (i * 45) + 'ms';
        btn.addEventListener('animationend', () => btn.classList.remove('deal'), { once: true });
      }
      this.optionsEl.appendChild(btn);
    });
    const ok = document.createElement('button');
    ok.className = 'tile confirm';
    ok.id = 'build-confirm';
    ok.textContent = '✓';
    ok.setAttribute('aria-label', 'Check my answer');
    this.optionsEl.appendChild(ok);
    this.updateConfirm();
  },

  placeInSlot(emoji) {
    if (this.won || this.resolving || this.rejecting) return;
    const slot = this.buildFilled.indexOf(null);   // leftmost empty
    if (slot === -1) return;                        // all full — clear one first
    this.buildFilled[slot] = emoji;
    const el = this.blankTiles[slot];
    el.textContent = emoji;
    el.classList.remove('wrong');
    el.classList.add('filled');
    this.audioPlace();
    this.updateConfirm();
  },

  clearSlot(slot) {
    if (this.won || this.resolving) return;
    if (this.buildFilled[slot] == null) return;
    this.buildFilled[slot] = null;
    const el = this.blankTiles[slot];
    el.textContent = '＋';
    el.classList.remove('filled', 'wrong');
    this.audioSwoosh();
    this.updateConfirm();
  },

  updateConfirm() {
    const ok = document.getElementById('build-confirm');
    if (!ok) return;
    ok.disabled = !this.buildFilled.every(e => e != null);
  },

  // Check the built continuation. A wrong slot flashes red (kept editable, no
  // penalty — principle 3); an all-correct build locks the slots (reveal pop),
  // fills a pip, and advances the round/celebrates (gameId-guarded), the same
  // terminal shape as a correct pick.
  checkBuild() {
    if (this.won || this.resolving || this.rejecting) return;
    if (!this.buildFilled.every(e => e != null)) return;
    const wrongSlots = this.buildFilled
      .map((e, j) => (e === this.answers[j] ? -1 : j))
      .filter(j => j >= 0);

    if (wrongSlots.length === 0) {
      this.resolving = true;
      this.audioRight();
      this.blankTiles.forEach(el => { el.classList.remove('blank', 'slot', 'filled'); el.classList.add('revealed'); });
      const ok = document.getElementById('build-confirm'); if (ok) ok.disabled = true;
      this.solved++;
      this.answersFound.push(...this.answers);
      this.renderPips();
      this.updateStatus('Yes! You built it!');
      const gen = this.gameId;
      setTimeout(() => {
        if (gen !== this.gameId) return;   // a new game replaced this round
        if (this.solved >= CONFIG.roundsPerSet) this.celebrate();
        else this.nextRound(true);
      }, CONFIG.advanceMs);
    } else {
      this.rejecting = true;
      this.audioOops();
      if (navigator.vibrate) navigator.vibrate(60);
      wrongSlots.forEach(j => {
        const el = this.blankTiles[j];
        el.classList.remove('wrong');
        void el.offsetWidth;   // reflow so the shake/flash can re-run
        el.classList.add('wrong');
      });
      this.updateStatus('Almost! Fix the red ones.');
      const gen = this.gameId;
      setTimeout(() => {
        if (gen !== this.gameId) return;   // a new game replaced this round
        this.rejecting = false;
        wrongSlots.forEach(j => this.blankTiles[j] && this.blankTiles[j].classList.remove('wrong'));
      }, CONFIG.wrongHoldMs);
    }
  },

  pickAnswer(i) {
    if (this.won || this.resolving || this.rejecting) return;

    const tile = this.optionsEl.querySelector(`.tile[data-index="${i}"]`);
    if (!tile) return;
    const picked = this.options[i];
    const correct = this.answers[this.step];

    if (picked === correct) {
      // Correct — reveal this blank as the real answer and fade the other
      // options. With more than one blank the first correct pick just advances
      // to the next blank's own option set; only the LAST blank resolving fills
      // a pip and advances the round/celebrates — the same "only the final step
      // serves/advances" shape as Grocery Cashier's two-step round.
      this.resolving = true;
      this.audioRight();
      tile.classList.add('correct');
      this.optionsEl.classList.add('resolved');
      this.blankTiles[this.step].textContent = correct;
      this.blankTiles[this.step].classList.remove('blank');
      this.blankTiles[this.step].classList.add('revealed');

      const gen = this.gameId;
      if (this.step < this.answers.length - 1) {
        this.step++;
        this.updateStatus('Yes! Keep going!');
        setTimeout(() => {
          if (gen !== this.gameId) return;   // a new game replaced this round
          this.resolving = false;
          this.renderStepOptions(true);
        }, CONFIG.advanceMs);
      } else {
        this.solved++;
        this.answersFound.push(...this.answers);
        this.renderPips();
        this.updateStatus(this.answers.length > 1 ? 'Yes! You filled them all!'
          : (this.hasInterior ? 'Yes! That was missing.' : 'Yes! That comes next.'));
        setTimeout(() => {
          if (gen !== this.gameId) return;   // a new game replaced this round
          if (this.solved >= CONFIG.roundsPerSet) {
            this.celebrate();
          } else {
            this.nextRound(true);
          }
        }, CONFIG.advanceMs);
      }
    } else {
      // Wrong — gentle "hmm" + a shake, a red flash, and a short buzz, no
      // penalty. Expected guessing, not a rule violation, so never the harsh
      // buzz sound (design principle 3); the tile settles back to neutral.
      // Input is locked for the animation's duration so rapid repeat-tapping
      // ("tap spam") can't sneak a pick in — on this tile or any other,
      // including the correct one — while the reject cue is still playing.
      this.rejecting = true;
      this.audioOops();
      if (navigator.vibrate) navigator.vibrate(60);
      tile.classList.remove('wrong');
      void tile.offsetWidth;   // reflow so the animation can re-run
      tile.classList.add('wrong');
      this.updateStatus('Not that one. Try again!');

      const gen = this.gameId;
      setTimeout(() => {
        if (gen !== this.gameId) return;   // a new game replaced this round
        this.rejecting = false;
      }, CONFIG.wrongHoldMs);
    }
  },

  celebrate() {
    this.won = true;
    const tier = CONFIG.celebrationTiers[Object.keys(CONFIG.sizes).indexOf(this.size)];
    this.audioWin(tier.notes);
    this.updateStatus('You found the pattern every time! Hooray!');
    this.renderWinEmojis();
    this.revealAnswersOnSequence();
    this.winOverlay.classList.add('show');
    Modal.open(this.winOverlay, () => this.newGame(true));
    for (let i = 0; i < tier.confetti; i++) {
      const conf = document.createElement('div');
      conf.className = 'confetti';
      conf.style.left = Math.random() * 100 + 'vw';
      conf.style.background = CONFIG.palette[Math.floor(Math.random() * CONFIG.palette.length)];
      conf.style.width = (6 + Math.random() * 8) + 'px';
      conf.style.height = (6 + Math.random() * 8) + 'px';
      conf.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      conf.style.animationDelay = (Math.random() * 0.8) + 's';
      document.body.appendChild(conf);
      setTimeout(() => conf.remove(), 4500);
    }
  },

  renderWinEmojis() {
    const row = document.getElementById('emoji-row');
    const set = this.emojiSets[Math.floor(Math.random() * this.emojiSets.length)];
    row.innerHTML = set.map(e => `<button>${e}</button>`).join('');
    // Poking a celebration emoji wiggles it and chirps — a tiny toy.
    row.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
      btn.classList.remove('wiggle');
      void btn.offsetWidth;
      btn.classList.add('wiggle');
      this.audioEmoji();
    }));
  },

  // Recap of the set's correct answers, shown by repopulating the real
  // #sequence (same .seq-tile look) rather than a separate strip — the
  // "answers" land where the game was actually played, staggered in like a
  // fresh deal (mirrors Odd One Out's revealOddsOnBoard()). Plain
  // non-interactive divs, not buttons — there's no tap action to offer here.
  revealAnswersOnSequence() {
    this.sequenceEl.setAttribute('aria-label', 'What you guessed each round');
    this.sequenceEl.innerHTML = '';
    this.answersFound.forEach((emoji, i) => {
      const div = document.createElement('div');
      div.className = 'seq-tile deal recap';
      div.textContent = emoji;
      div.style.animationDelay = (i * 45) + 'ms';
      div.addEventListener('animationend', () => div.classList.remove('deal'), { once: true });
      this.sequenceEl.appendChild(div);
    });
    this.optionsEl.innerHTML = '';
    this.optionsEl.classList.remove('resolved', 'build-mode');
  },

  openSettings() { this.settingsOverlay.classList.add('show'); this.updateSizeButtons(); Modal.open(this.settingsOverlay, () => this.closeSettings()); },
  closeSettings() { this.settingsOverlay.classList.remove('show'); Modal.close(); },

  setSize(size) {
    if (size === this.size) { this.closeSettings(); return; }
    this.size = size;
    this.updateSizeButtons();
    // Close first so the re-deal is visible, never a silent reset behind the
    // overlay (design principle 9).
    this.closeSettings();
    this.newGame(true);
  },

  updateSizeButtons() {
    this.settingsOverlay.querySelectorAll('.size-btn').forEach(btn => {
      const active = btn.dataset.size === this.size;
      btn.classList.toggle('active', active);
      btn.setAttribute('aria-checked', active ? 'true' : 'false');
    });
  },

  updateStatus(msg) { this.status.textContent = msg; },

  setupPWA() {
    // The whole toybox is one PWA: a single shared manifest
    // (../manifest.webmanifest, linked in <head>) and one root-scoped
    // service worker. Browsers reject blob:/data: worker scripts and
    // file:// has no SW support, so register only over http(s).
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      navigator.serviceWorker.register('../sw.js').then((root) => {
        // Drop any old per-game worker from before unification so the one
        // root worker controls this page (longest scope wins).
        navigator.serviceWorker.getRegistrations().then((regs) =>
          regs.forEach((r) => {
            if (r !== root && r.scope.startsWith(root.scope) && r.scope !== root.scope) r.unregister();
          })
        );
      }).catch(() => {});
    }
  },

  ensureAudio() {
    if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
  },

  playTone({ type = 'sine', freq = 440, duration = 100, startGain = 0.0001, peakGain = 0.15 }) {
    this.ensureAudio();
    const ctx = this.audioCtx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(startGain, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(peakGain, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration / 1000);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration / 1000 + 0.02);
  },

  audioRight() {
    // Rising two-note chime for a correct guess.
    this.playTone({ type: 'sine', freq: 660, duration: 90, peakGain: 0.16 });
    setTimeout(() => this.playTone({ type: 'sine', freq: 990, duration: 110, peakGain: 0.14 }), 90);
  },

  // Gentle "hmm", not a punitive buzz (design principle 3).
  audioOops() { this.playTone({ type: 'sine', freq: 240, duration: 160, peakGain: 0.1 }); },

  // Soft, short "place" tick when a build-mode palette tile drops into a slot.
  audioPlace() { this.playTone({ type: 'sine', freq: 520, duration: 70, peakGain: 0.12 }); },

  audioEmoji() {
    const freq = [523, 587, 659, 784, 880][Math.floor(Math.random() * 5)]; // pentatonic chirp
    this.playTone({ type: 'sine', freq, duration: 140, peakGain: 0.15 });
  },

  audioSwoosh() {
    this.ensureAudio();
    const ctx = this.audioCtx;
    const bufferSize = ctx.sampleRate * 0.1;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);
    src.connect(gain).connect(ctx.destination);
    src.start();
  },

  audioWin(notes) {
    notes.forEach((freq, i) => {   // C-E-G major arpeggio, extended at higher difficulty
      setTimeout(() => this.playTone({ type: 'sine', freq, duration: 220, peakGain: 0.18 }), i * 180);
    });
  }
};

App.init();
</script>
</body>
</html>
