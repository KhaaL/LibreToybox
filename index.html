<!DOCTYPE html>
<!-- LibreToybox — Game hub · Licensed under the GNU GPL v3.0; see LICENSE -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LibreToybox</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪁</text></svg>" />
  <link rel="manifest" id="manifest-link" href="data:application/json,%7B%7D" />
  <meta name="theme-color" content="#9480DC" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    /* Own background on html stops the body gradient propagating to the
       canvas, where it would tile — rubber-band overscroll then shows the
       wrong end of the gradient instead of blending with the page. */
    html { background: #FFF8E7; }
    body {
      font-family: ui-rounded, 'Hiragino Maru Gothic ProN', Quicksand, Comfortaa, 'Arial Rounded MT Bold', 'Varela Round', Calibri, sans-serif;
      background: linear-gradient(180deg, #FFF8E7, #E0D9FF);
      color: #3A3060;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }
    h1 { font-size: 2.4rem; margin: 0 0 4px; }
    p.tagline { margin: 0 0 32px; opacity: 0.75; text-align: center; max-width: 480px; }
    .games {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      width: 100%;
      max-width: 440px;
    }
    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 16px 10px;
      background: #fff;
      border: 3px solid #C0B4F0;
      border-radius: 20px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.12);
      text-decoration: none;
      color: #3A3060;
      font-size: 1.05rem;
      font-weight: bold;
      transition: transform .1s, border-color .1s;
    }
    a.card:hover { border-color: #9480DC; transform: translateY(-2px); }
    a.card:focus-visible { outline: 4px solid #9480DC; outline-offset: 2px; }
    a.card:active { transform: translateY(3px); }
    .emoji { font-size: 2.4rem; }
    footer { margin-top: 40px; font-size: 0.85rem; opacity: 0.75; }
    footer a { color: inherit; }
  </style>
</head>
<body>
  <h1>🪁 LibreToybox</h1>
  <p class="tagline">Self-contained HTML5 games for kids aged 6–8. No tracking, ads or registration - just play.</p>
  <div class="games">
    <a class="card" href="sudoku-for-minis/">
      <span class="emoji">🔢</span>
      Child Sudoku
    </a>
    <a class="card" href="exquisite-corpse/">
      <span class="emoji">🎨</span>
      Fold and Pass
    </a>
    <a class="card" href="memory/">
      <span class="emoji">❓</span>
      Memory
    </a>
    <a class="card" href="shape-fit/">
      <span class="emoji">🧩</span>
      Shape Fit
    </a>
    <a class="card" href="emoji-paint/">
      <span class="emoji">🌟</span>
      Emoji Paint
    </a>
    <a class="card" href="odd-one-out/">
      <span class="emoji">🔍</span>
      Odd One Out
    </a>
  </div>
  <footer><a href="https://github.com/KhaaL/LibreToybox">Source on GitHub</a> · GNU GPL v3.0</footer>

  <script>
    // The hub is plain static markup with no game object/init() to hang a
    // setupPWA() method off of, so this is a self-contained adaptation of
    // every game's identical manifest-blob + service-worker pattern.
    (function () {
      function makeIcon(size) {
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 100 100">
          <rect width="100" height="100" fill="#FFF8E7" rx="18"/>
          <text x="50" y="68" font-size="60" text-anchor="middle">🪁</text>
        </svg>`;
        return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
      }

      const manifest = {
        name: 'LibreToybox',
        short_name: 'LibreToybox',
        start_url: '.',
        display: 'standalone',
        background_color: '#FFF8E7',
        theme_color: '#9480DC',
        icons: [
          { src: makeIcon(192), sizes: '192x192', type: 'image/svg+xml' },
          { src: makeIcon(512), sizes: '512x512', type: 'image/svg+xml' }
        ]
      };
      const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
      document.getElementById('manifest-link').href = URL.createObjectURL(blob);

      // Service workers must be registered from a real http(s) URL — browsers
      // reject blob:/data: worker scripts, and file:// has no SW support anyway.
      if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      }
    })();
  </script>
</body>
</html>
