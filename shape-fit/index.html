<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shape Fit</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪁</text></svg>" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <meta name="theme-color" content="#2FA98C" />
  <style>
    :root {
      --bg1: #EFFBF4;
      --bg2: #D6F0E2;
      --accent: #2FA98C;
      --border: #A9CDBD;
      --text: #3E4A44;
      --cell: 56px;        /* set from JS: board width / N */
      --tray-scale: 0.5;   /* set from JS: CONFIG.trayScale */
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; }
    /* Own background on html stops the body gradient propagating to the
       canvas, where it would tile — rubber-band overscroll then shows the
       wrong end of the gradient instead of blending with the page. */
    html { background: var(--bg1); }
    body {
      font-family: ui-rounded, 'Hiragino Maru Gothic ProN', Quicksand, Comfortaa, 'Arial Rounded MT Bold', 'Varela Round', Calibri, sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }

    header {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 6px;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .logo { display: flex; align-items: center; }
    .top-btns { display: flex; gap: 8px; }
    .top-btn {
      position: relative;
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 3px 0 #cfe3d8;
      transition: transform .05s;
      min-width: 48px;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: inherit;
    }
    .top-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #cfe3d8; }
    /* New Game requires a deliberate hold, not a quick tap, so an accidental
       tap can't silently wipe the board. */
    .hold-progress { position: absolute; inset: 5px; border-radius: 50%; pointer-events: none; opacity: 0; transition: opacity .1s; }
    .top-btn.holding .hold-progress { opacity: 1; }

    main { width: 100%; max-width: 420px; padding: 8px 16px 18px; display: flex; flex-direction: column; align-items: center; gap: 14px; }

    .grid-wrap {
      width: min(92vw, 360px);
      background: #fff;
      border: 4px solid #7AA692;
      border-radius: 14px;
      padding: 8px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.12);
    }

    /* The board is both a CSS grid (empty cells) and the positioning
       context for the absolutely-placed pieces on top of it. */
    #board {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      touch-action: none;
    }
    .cell {
      border: 2px dashed #DCEAE2;
      border-radius: 8px;
      margin: 2px;
      pointer-events: none;
    }
    .cell.ghost {
      border: 2px solid #74C69D;
      background: #D8F3E3;
    }

    /* Pieces: one div per polyomino, made of .blk squares. Everything is
       sized off --cell so a resize only has to update that one variable. */
    .piece {
      position: absolute;
      transform-origin: 0 0;
      touch-action: none;
      cursor: grab;
      z-index: 5;
    }
    .piece:focus-visible { outline: 3px solid var(--text); outline-offset: 3px; border-radius: 10px; }
    .piece.in-tray { left: 0; top: 0; transform: scale(var(--tray-scale)); }
    .piece.dragging {
      position: fixed;
      z-index: 60;
      cursor: grabbing;
      filter: drop-shadow(0 12px 14px rgba(0,0,0,0.25));
    }
    /* Pickup ease: on for the first liftMs of a drag, so the piece grows
       from tray scale and rises to the lifted pose instead of teleporting. */
    .piece.lifting { transition: left .13s ease-out, top .13s ease-out, transform .13s ease-out; }
    .piece.flying {
      position: fixed;
      z-index: 60;
      transition: left .25s ease, top .25s ease, transform .25s ease;
      pointer-events: none;
    }
    /* Block borders, radii and bevels are set per-side from JS so the
       outline runs around the piece's outer perimeter only — the piece
       reads as one connected shape with a visible edge. */
    .blk {
      position: absolute;
      border-style: solid;
      border-width: 0;
    }
    .piece.pop .blk { animation: settle .22s ease-out; }
    .piece.shake { animation: shake .3s ease; }

    #tray {
      width: min(92vw, 400px);
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: center;
      gap: 12px;
      padding: 4px 0 8px;
    }
    /* Slots keep their size forever — an empty slot is an invisible spacer,
       so the tray never reflows while the child is dragging. */
    .slot { position: relative; }
    .slot.deal { animation: pop .3s ease-out both; animation-delay: var(--d, 0s); }
    .slot.out, .piece.out { animation: suction .22s ease-in forwards; }

    /* Visually hidden but available to screen readers (aria-live announcements
       still fire). Standard clip-based sr-only pattern. */
    .status { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); clip-path: inset(50%); white-space: nowrap; border: 0; }

    @keyframes pop { 0% { transform: scale(0.6); opacity: 0.4; } 60% { transform: scale(1.12); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes settle { 0% { transform: scale(0.85); } 60% { transform: scale(1.08); } 100% { transform: scale(1); } }
    @keyframes shake { 0%, 100% { margin-left: 0; } 25% { margin-left: -7px; } 75% { margin-left: 7px; } }
    @keyframes suction { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.1); opacity: 0; } }
    @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      text-align: center;
      padding: 20px;
    }
    .overlay.show { display: flex; }
    /* Translucent win overlay so the filled board stays visible beneath
       the celebration (same pattern as Memory). */
    #win-overlay { background: rgba(255,255,255,0.55); justify-content: flex-end; padding-bottom: 12vh; }
    #settings-overlay { background: rgba(255,255,255,0.92); }
    .emoji-row { font-size: 4.5rem; display: flex; gap: 18px; margin-bottom: 22px; }
    .emoji-row button { background: none; border: none; padding: 0; font: inherit; cursor: pointer; animation: pop .6s ease-out both; }
    .emoji-row button:nth-child(2) { animation-delay: .15s; }
    .emoji-row button:nth-child(3) { animation-delay: .3s; }
    .emoji-row button:focus-visible { outline: 3px solid var(--text); outline-offset: 2px; border-radius: 12px; }
    .emoji-row button.wiggle { animation: wiggle .5s ease; }
    @keyframes wiggle { 0%, 100% { transform: rotate(0) scale(1); } 25% { transform: rotate(-12deg) scale(1.25); } 55% { transform: rotate(9deg) scale(1.12); } 80% { transform: rotate(-4deg) scale(1.04); } }
    .confetti { position: fixed; top: 0; left: 0; width: 10px; height: 10px; pointer-events: none; z-index: 101; animation: fall linear forwards; }

    .settings-card {
      background: #fff;
      border: 3px solid var(--border);
      border-radius: 18px;
      padding: 22px 26px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      min-width: 260px;
    }
    .settings-card h2 { margin: 0; font-size: 2rem; }
    .size-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 18px; max-width: 252px; }
    .size-btn {
      width: 72px;
      height: 72px;
      border: 2px solid var(--border);
      border-radius: 16px;
      background: #fff;
      font-family: inherit;
      font-size: 1.7rem;
      cursor: pointer;
      box-shadow: 0 4px 0 #cfe3d8;
      transition: transform .05s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: var(--text);
    }
    .size-btn small { font-size: 0.8rem; }
    .size-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #cfe3d8; }
    .size-btn.active { box-shadow: 0 0 0 4px gold, 0 4px 0 #cfe3d8; }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <a class="top-btn" id="back-btn" href="../index.html" aria-label="Back to LibreToybox home">🏠</a>
      <div class="logo" role="img" aria-label="Shape Fit" title="Shape Fit">
        <svg viewBox="0 0 48 48" width="40" height="40" aria-hidden="true">
          <rect x="4" y="4" width="13" height="13" rx="4" fill="#F7A6B9"/>
          <rect x="4" y="18" width="13" height="13" rx="4" fill="#F7A6B9"/>
          <rect x="4" y="32" width="13" height="13" rx="4" fill="#F7A6B9"/>
          <rect x="18" y="32" width="13" height="13" rx="4" fill="#F7A6B9"/>
          <rect x="18" y="4" width="13" height="13" rx="4" fill="#8ED3F4"/>
          <rect x="32" y="4" width="13" height="13" rx="4" fill="#8ED3F4"/>
          <rect x="32" y="18" width="13" height="13" rx="4" fill="#FFE66D"/>
          <rect x="32" y="32" width="13" height="13" rx="4" fill="#FFE66D"/>
        </svg>
      </div>
    </div>
    <div class="top-btns">
      <button class="top-btn" id="new-game" aria-label="New Game">🔄<span class="hold-progress" aria-hidden="true"></span></button>
      <button class="top-btn" id="settings-btn" aria-label="Settings">⚙️</button>
    </div>
  </header>

  <main>
    <div class="status" id="status" aria-live="polite"></div>
    <div class="grid-wrap">
      <div id="board" role="group" aria-label="Puzzle board"></div>
    </div>
    <div id="tray" role="group" aria-label="Piece tray"></div>
  </main>

  <div class="overlay" id="win-overlay" role="dialog" aria-modal="true" aria-label="You won">
    <div class="emoji-row" id="emoji-row"></div>
    <div class="top-btns">
      <a class="top-btn" id="win-home-btn" href="../index.html" aria-label="Back to LibreToybox home">🏠</a>
      <button class="top-btn" id="play-again" aria-label="Play Again">🔄</button>
    </div>
  </div>

  <div class="overlay" id="settings-overlay" role="dialog" aria-modal="true" aria-label="Settings">
    <div class="settings-card">
      <h2>⚙️</h2>
      <div class="size-row" role="radiogroup" aria-label="Board size">
        <button class="size-btn" data-size="tiny" role="radio" aria-label="Easy, 4 by 4">🐣<small>4×4</small></button>
        <button class="size-btn" data-size="mini" role="radio" aria-label="Normal, 5 by 5">🕊️<small>5×5</small></button>
        <button class="size-btn" data-size="small" role="radio" aria-label="Hard, 6 by 6">🦅<small>6×6</small></button>
      </div>
      <button class="top-btn" id="close-settings" aria-label="Close">✕</button>
    </div>
  </div>

  <script>
    // All tuning lives here — board sizes, piece sizes, timings, colors.
    const CONFIG = {
      sizes: {
        tiny:  { n: 4, minPiece: 3, maxPiece: 4 },
        mini:  { n: 5, minPiece: 3, maxPiece: 5 },
        small: { n: 6, minPiece: 3, maxPiece: 5 }
      },
      trayScale: 0.5,
      liftPx: 56,        // grabbed point rides this far above the finger (touch/pen only)
      liftMs: 130,       // pickup eases into the lifted pose instead of teleporting
      snapRange: 0.8,    // max distance (in cells) a drop may be from a fitting spot
      tapMovePx: 8,      // pointer travel below this counts as a tap
      flyBackMs: 260,
      dealStaggerMs: 40,
      palette: [
        { fill: '#F7A6B9', edge: '#DE7590', name: 'pink' },
        { fill: '#F9C784', edge: '#DE9A47', name: 'orange' },
        { fill: '#FFE66D', edge: '#DCBC2E', name: 'yellow' },
        { fill: '#A8E6CF', edge: '#6DBF9B', name: 'mint' },
        { fill: '#8ED3F4', edge: '#54A6D2', name: 'blue' },
        { fill: '#C3B4F7', edge: '#9480DC', name: 'purple' },
        { fill: '#FFB3A0', edge: '#DE7F66', name: 'coral' },
        { fill: '#C8E88A', edge: '#96C24E', name: 'green' }
      ]
    };

    // --- Shared modal a11y helper (copied into each game — the suite ships no
    // bundler). Moves focus into an opened overlay, traps Tab within it, closes
    // on Escape, and restores focus to the opener on close (design principle 8). ---
    const Modal = {
      opener: null, overlay: null, onDismiss: null, handler: null,
      focusable(el) {
        return [...el.querySelectorAll('a[href], button:not([disabled]), input, select, textarea, [tabindex]:not([tabindex="-1"])')]
          .filter(n => n.getClientRects().length > 0);
      },
      open(overlay, onDismiss) {
        this.opener = document.activeElement;
        this.overlay = overlay;
        this.onDismiss = onDismiss || null;
        const items = this.focusable(overlay);
        (items[0] || overlay).focus({ preventScroll: true });
        this.handler = (e) => {
          if (e.key === 'Escape') {
            e.preventDefault();
            if (this.onDismiss) this.onDismiss(); else this.close();
          } else if (e.key === 'Tab') {
            const f = this.focusable(overlay);
            if (!f.length) { e.preventDefault(); return; }
            const first = f[0], last = f[f.length - 1];
            if (e.shiftKey && (document.activeElement === first || !overlay.contains(document.activeElement))) {
              e.preventDefault(); last.focus();
            } else if (!e.shiftKey && (document.activeElement === last || !overlay.contains(document.activeElement))) {
              e.preventDefault(); first.focus();
            }
          }
        };
        document.addEventListener('keydown', this.handler, true);
      },
      close() {
        if (this.handler) document.removeEventListener('keydown', this.handler, true);
        this.handler = null;
        const opener = this.opener;
        this.opener = this.overlay = this.onDismiss = null;
        if (opener && opener.focus) opener.focus({ preventScroll: true });
      }
    };

    const App = {
      pieces: [],       // { cells:[{r,c}] normalized, rows, cols, color, placed:{r,c}|null, el, slotEl }
      N: 5,
      size: 'mini',
      won: false,
      drag: null,       // { p, pointerId, startX, startY, moved, fromPlaced, target }
      kb: null,         // { p, r, c } keyboard placement cursor
      gameId: 0,
      audioCtx: null,
      emojiSets: [
        ['🎉', '🌟', '🏆'],
        ['🎈', '🌈', '🎊'],
        ['🥳', '✨', '🍭']
      ],

      init() {
        this.cacheDOM();
        this.bindEvents();
        document.documentElement.style.setProperty('--tray-scale', CONFIG.trayScale);
        this.newGame(false);
        this.setupPWA();
      },

      cacheDOM() {
        this.board = document.getElementById('board');
        this.tray = document.getElementById('tray');
        this.status = document.getElementById('status');
        this.overlay = document.getElementById('win-overlay');
        this.newGameBtn = document.getElementById('new-game');
        this.playAgainBtn = document.getElementById('play-again');
        this.settingsOverlay = document.getElementById('settings-overlay');
        this.settingsBtn = document.getElementById('settings-btn');
        this.closeSettingsBtn = document.getElementById('close-settings');
      },

      bindEvents() {
        this.bindNewGameHold();
        this.playAgainBtn.addEventListener('click', () => this.newGame(true));
        this.settingsBtn.addEventListener('click', () => this.openSettings());
        this.closeSettingsBtn.addEventListener('click', () => this.closeSettings());
        this.settingsOverlay.addEventListener('click', (e) => {
          if (e.target === this.settingsOverlay) this.closeSettings();
        });
        this.settingsOverlay.querySelectorAll('.size-btn').forEach(btn => {
          btn.addEventListener('click', () => this.setSize(btn.dataset.size));
        });
        window.addEventListener('resize', () => {
          this.setCellSize();
          if (this.kb) this.positionKb();
        });
      },

      // New Game requires a deliberate hold, not a quick tap, so an
      // accidental tap can't silently wipe the board. A quick tap/keypress
      // does nothing; only a sustained HOLD_MS hold re-deals.
      bindNewGameHold() {
        const HOLD_MS = 500;
        const btn = this.newGameBtn;
        const ring = btn.querySelector('.hold-progress');
        let timer = null, raf = null, startTime = null, startPt = null, active = false;

        const tick = () => {
          const pct = Math.min(100, ((performance.now() - startTime) / HOLD_MS) * 100);
          ring.style.background = `conic-gradient(rgba(47,169,140,0.85) ${pct}%, transparent ${pct}%)`;
          if (pct < 100) raf = requestAnimationFrame(tick);
        };
        const start = () => {
          if (active) return;
          active = true;
          startTime = performance.now();
          btn.classList.add('holding');
          tick();
          timer = setTimeout(() => {
            active = false;
            btn.classList.remove('holding');
            if (navigator.vibrate) navigator.vibrate(40);
            this.newGame(true);
          }, HOLD_MS);
        };
        const cancel = () => {
          if (!active) return;
          active = false;
          clearTimeout(timer);
          if (raf) cancelAnimationFrame(raf);
          btn.classList.remove('holding');
          ring.style.background = '';
        };

        btn.addEventListener('pointerdown', (e) => { startPt = { x: e.clientX, y: e.clientY }; start(); });
        btn.addEventListener('pointermove', (e) => {
          if (!active || !startPt) return;
          if (Math.hypot(e.clientX - startPt.x, e.clientY - startPt.y) > 10) cancel();
        });
        btn.addEventListener('pointerup', cancel);
        btn.addEventListener('pointercancel', cancel);
        btn.addEventListener('pointerleave', cancel);
        btn.addEventListener('keydown', (e) => {
          if ((e.key === 'Enter' || e.key === ' ') && !e.repeat) { e.preventDefault(); start(); }
        });
        btn.addEventListener('keyup', (e) => {
          if (e.key === 'Enter' || e.key === ' ') cancel();
        });
      },

      /* ---------- puzzle generation ---------- */

      // Partition the n×n grid into connected polyomino regions by
      // randomized region-growing, so a solution exists by construction.
      generatePieces(n, minS, maxS) {
        const total = n * n;
        const ids = new Array(total).fill(-1);
        const nb = (i) => {
          const r = (i / n) | 0, c = i % n, out = [];
          if (r > 0) out.push(i - n);
          if (r < n - 1) out.push(i + n);
          if (c > 0) out.push(i - 1);
          if (c < n - 1) out.push(i + 1);
          return out;
        };

        let pid = 0;
        for (let seed = 0; seed < total; seed++) {
          if (ids[seed] !== -1) continue;
          const target = minS + Math.floor(Math.random() * (maxS - minS + 1));
          const region = [seed];
          ids[seed] = pid;
          while (region.length < target) {
            const frontier = [];
            region.forEach(i => nb(i).forEach(j => {
              if (ids[j] === -1 && !frontier.includes(j)) frontier.push(j);
            }));
            if (!frontier.length) break;
            const j = frontier[(Math.random() * frontier.length) | 0];
            ids[j] = pid;
            region.push(j);
          }
          pid++;
        }

        // Growth can strand undersized leftovers; absorb each into an
        // adjacent region (the union of two adjacent regions stays connected).
        for (;;) {
          const sizes = new Map();
          ids.forEach(id => sizes.set(id, (sizes.get(id) || 0) + 1));
          let small = -1;
          for (const [id, s] of sizes) if (s < minS && sizes.size > 1) { small = id; break; }
          if (small === -1) break;
          let into = -1;
          for (let i = 0; i < total && into === -1; i++) {
            if (ids[i] !== small) continue;
            for (const j of nb(i)) if (ids[j] !== small) { into = ids[j]; break; }
          }
          for (let i = 0; i < total; i++) if (ids[i] === small) ids[i] = into;
        }

        // Collect cells per region in first-appearance order.
        const order = new Map();
        const cellsById = [];
        ids.forEach((id, i) => {
          if (!order.has(id)) { order.set(id, cellsById.length); cellsById.push([]); }
          cellsById[order.get(id)].push({ r: (i / n) | 0, c: i % n });
        });

        // Greedy coloring over region adjacency so touching pieces never
        // share a color; palette order is shuffled per game for variety.
        const adj = cellsById.map(() => new Set());
        ids.forEach((id, i) => {
          nb(i).forEach(j => {
            if (ids[j] !== id) adj[order.get(id)].add(order.get(ids[j]));
          });
        });
        const paletteOrder = this.shuffle(CONFIG.palette.map((_, i) => i));
        const colorIdx = new Array(cellsById.length).fill(-1);
        cellsById.forEach((_, k) => {
          const used = new Set([...adj[k]].map(m => colorIdx[m]).filter(v => v >= 0));
          let pick = paletteOrder.find(ci => !used.has(ci));
          if (pick === undefined) pick = paletteOrder[(Math.random() * paletteOrder.length) | 0];
          colorIdx[k] = pick;
        });

        return cellsById.map((cells, k) => {
          const minR = Math.min(...cells.map(c => c.r));
          const minC = Math.min(...cells.map(c => c.c));
          const norm = cells.map(({ r, c }) => ({ r: r - minR, c: c - minC }));
          return {
            cells: norm,
            rows: Math.max(...norm.map(c => c.r)) + 1,
            cols: Math.max(...norm.map(c => c.c)) + 1,
            color: CONFIG.palette[colorIdx[k]],
            placed: null,
            el: null,
            slotEl: null
          };
        });
      },

      /* ---------- game flow ---------- */

      newGame(animated) {
        this.overlay.classList.remove('show');
        Modal.close();
        this.gameId++;
        this.won = false;
        this.drag = null;
        this.kb = null;
        const { n, minPiece, maxPiece } = CONFIG.sizes[this.size];
        this.N = n;
        this.pieces = this.shuffle(this.generatePieces(n, minPiece, maxPiece));

        if (animated && this.tray.children.length > 0) {
          // Re-deal visibly (design principle 9): everything sucks away first.
          this.audioSwoosh();
          [...this.tray.children].forEach(el => el.classList.add('out'));
          [...this.board.querySelectorAll('.piece')].forEach(el => el.classList.add('out'));
          setTimeout(() => this.renderAll(true), 230);
        } else {
          this.renderAll(animated);
        }
        this.updateStatus('');
      },

      renderAll(deal) {
        this.board.style.gridTemplateColumns = `repeat(${this.N}, 1fr)`;
        this.board.style.gridTemplateRows = `repeat(${this.N}, 1fr)`;
        this.board.innerHTML = '';
        this.cellEls = [];
        for (let i = 0; i < this.N * this.N; i++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.setAttribute('aria-hidden', 'true');
          this.board.appendChild(cell);
          this.cellEls.push(cell);
        }

        this.tray.innerHTML = '';
        this.pieces.forEach((p, i) => {
          const slot = document.createElement('div');
          slot.className = 'slot';
          slot.style.width = `calc(var(--cell) * ${p.cols * CONFIG.trayScale})`;
          slot.style.height = `calc(var(--cell) * ${p.rows * CONFIG.trayScale})`;
          if (deal) {
            slot.classList.add('deal');
            slot.style.setProperty('--d', `${i * CONFIG.dealStaggerMs}ms`);
            // The fill-mode transform must be cleared once the pop-in ends:
            // any ancestor with a transform becomes the containing block for
            // position:fixed, which would anchor the dragged piece to this
            // little slot instead of the viewport.
            slot.addEventListener('animationend', () => slot.classList.remove('deal'), { once: true });
          }
          p.slotEl = slot;
          slot.appendChild(this.buildPieceEl(p));
          this.tray.appendChild(slot);
        });
        this.setCellSize();
      },

      buildPieceEl(p) {
        const el = document.createElement('div');
        el.className = 'piece in-tray';
        el.style.width = `calc(var(--cell) * ${p.cols})`;
        el.style.height = `calc(var(--cell) * ${p.rows})`;
        el.tabIndex = 0;
        el.setAttribute('role', 'button');
        el.setAttribute('aria-label', `${p.color.name} piece, ${p.cells.length} blocks`);
        // Blocks merge into one solid shape: no inset or border on edges
        // shared with a sibling block; the piece's outer perimeter gets an
        // inset gap, a darker outline and a bevel, so two same-colored
        // pieces placed side by side never blend together.
        const has = new Set(p.cells.map(({ r, c }) => `${r},${c}`));
        const INSET = 2, EDGE = 3, RADIUS = 10;
        p.cells.forEach(({ r, c }) => {
          const up = has.has(`${r - 1},${c}`), down = has.has(`${r + 1},${c}`);
          const left = has.has(`${r},${c - 1}`), right = has.has(`${r},${c + 1}`);
          const b = document.createElement('div');
          b.className = 'blk';
          b.style.left = `calc(var(--cell) * ${c} + ${left ? 0 : INSET}px)`;
          b.style.top = `calc(var(--cell) * ${r} + ${up ? 0 : INSET}px)`;
          b.style.width = `calc(var(--cell) - ${(left ? 0 : INSET) + (right ? 0 : INSET)}px)`;
          b.style.height = `calc(var(--cell) - ${(up ? 0 : INSET) + (down ? 0 : INSET)}px)`;
          b.style.background = p.color.fill;
          b.style.borderColor = p.color.edge;
          b.style.borderWidth = `${up ? 0 : EDGE}px ${right ? 0 : EDGE}px ${down ? 0 : EDGE}px ${left ? 0 : EDGE}px`;
          b.style.borderRadius = `${!up && !left ? RADIUS : 0}px ${!up && !right ? RADIUS : 0}px ${!down && !right ? RADIUS : 0}px ${!down && !left ? RADIUS : 0}px`;
          const bevel = [];
          if (!up) bevel.push('inset 0 3px 0 rgba(255,255,255,0.4)');
          if (!down) bevel.push('inset 0 -3px 0 rgba(0,0,0,0.08)');
          if (bevel.length) b.style.boxShadow = bevel.join(', ');
          el.appendChild(b);
        });
        el.addEventListener('pointerdown', (e) => this.onPointerDown(e, p));
        el.addEventListener('pointermove', (e) => this.onPointerMove(e));
        el.addEventListener('pointerup', (e) => this.onPointerUp(e));
        el.addEventListener('pointercancel', (e) => this.onPointerCancel(e));
        el.addEventListener('keydown', (e) => this.onPieceKey(e, p));
        el.addEventListener('blur', () => { if (this.kb && this.kb.p === p) this.endKb(true); });
        p.el = el;
        return el;
      },

      setCellSize() {
        const w = this.board.clientWidth;
        if (w > 0) document.documentElement.style.setProperty('--cell', (w / this.N) + 'px');
      },

      /* ---------- placement rules ---------- */

      occupancy() {
        const occ = new Array(this.N * this.N).fill(false);
        this.pieces.forEach(p => {
          if (!p.placed) return;
          p.cells.forEach(({ r, c }) => { occ[(p.placed.r + r) * this.N + (p.placed.c + c)] = true; });
        });
        return occ;
      },

      fits(p, r, c, occ) {
        return p.cells.every(({ r: dr, c: dc }) => {
          const rr = r + dr, cc = c + dc;
          return rr >= 0 && rr < this.N && cc >= 0 && cc < this.N && !occ[rr * this.N + cc];
        });
      },

      placePiece(p, r, c) {
        p.placed = { r, c };
        const el = p.el;
        el.classList.remove('dragging', 'flying', 'in-tray', 'pop', 'lifting');
        el.style.left = `calc(var(--cell) * ${c})`;
        el.style.top = `calc(var(--cell) * ${r})`;
        el.style.transform = '';
        this.board.appendChild(el);
        void el.offsetWidth;
        el.classList.add('pop');
        this.audioPlace();
        this.updateStatus(`Placed the ${p.color.name} piece.`);
        this.checkWin();
      },

      flyToTray(p) {
        const el = p.el, slot = p.slotEl;
        const cur = el.getBoundingClientRect();
        p.placed = null;
        el.classList.remove('dragging', 'in-tray', 'pop', 'shake', 'lifting');
        el.classList.add('flying');
        el.style.left = cur.left + 'px';
        el.style.top = cur.top + 'px';
        el.style.transform = '';
        void el.offsetWidth;
        const t = slot.getBoundingClientRect();
        el.style.left = t.left + 'px';
        el.style.top = t.top + 'px';
        el.style.transform = `scale(${CONFIG.trayScale})`;
        const gen = this.gameId;
        setTimeout(() => {
          if (gen !== this.gameId) return;
          el.classList.remove('flying');
          el.classList.add('in-tray');
          el.style.left = el.style.top = el.style.transform = '';
          if (el.parentNode !== slot) slot.appendChild(el);
        }, CONFIG.flyBackMs);
      },

      checkWin() {
        if (!this.pieces.every(p => p.placed)) return;
        this.won = true;
        const gen = this.gameId;
        setTimeout(() => { if (gen === this.gameId) this.celebrate(); }, 350);
      },

      /* ---------- drag interaction ---------- */

      onPointerDown(e, p) {
        if (this.won || this.drag) return;
        if (this.kb) this.endKb(true);
        e.preventDefault();
        p.el.setPointerCapture(e.pointerId);
        // Carry by the grabbed point: the spot under the finger stays under
        // the finger (normalized, so the tray's 0.5 scale maps to the same
        // spot at full size), riding liftPx above it so the hand never hides
        // the piece. A mouse cursor hides nothing, so it gets no lift.
        const rect = p.el.getBoundingClientRect();
        this.drag = {
          p, pointerId: e.pointerId,
          startX: e.clientX, startY: e.clientY,
          grabX: (e.clientX - rect.left) / rect.width,
          grabY: (e.clientY - rect.top) / rect.height,
          lift: e.pointerType === 'mouse' ? 0 : CONFIG.liftPx,
          moved: false, fromPlaced: !!p.placed, target: null, x: 0, y: 0
        };
        p.placed = null;
        p.slotEl.classList.remove('deal'); // grabbed mid-pop: kill the slot transform now
        const el = p.el;
        el.classList.remove('in-tray', 'pop');
        el.classList.add('dragging');
        // Ease into the lifted pose from the exact current visual pose
        // (position and scale) instead of teleporting under the finger.
        el.style.left = rect.left + 'px';
        el.style.top = rect.top + 'px';
        el.style.transform = `scale(${rect.width / el.offsetWidth})`;
        void el.offsetWidth;
        el.classList.add('lifting');
        clearTimeout(this.liftTimer);
        this.liftTimer = setTimeout(() => el.classList.remove('lifting'), CONFIG.liftMs);
        el.style.transform = '';
        this.positionDrag(e);
        this.updateGhost();
        this.audioPickup();
        this.updateStatus(`Picked up the ${p.color.name} piece.`);
      },

      positionDrag(e) {
        const d = this.drag, el = d.p.el;
        d.x = e.clientX - d.grabX * el.offsetWidth;
        d.y = e.clientY - d.grabY * el.offsetHeight - d.lift;
        el.style.left = d.x + 'px';
        el.style.top = d.y + 'px';
      },

      onPointerMove(e) {
        if (!this.drag || e.pointerId !== this.drag.pointerId) return;
        if (Math.hypot(e.clientX - this.drag.startX, e.clientY - this.drag.startY) > CONFIG.tapMovePx) {
          this.drag.moved = true;
        }
        this.positionDrag(e);
        this.updateGhost();
      },

      onPointerUp(e) {
        const d = this.drag;
        if (!d || e.pointerId !== d.pointerId) return;
        this.drag = null;
        this.clearGhost();
        const p = d.p;
        // .dragging stays on until placePiece/flyToTray resolves the drop,
        // so the piece keeps its fixed position meanwhile.
        if (d.moved && d.target) {
          this.placePiece(p, d.target.r, d.target.c);
          return;
        }
        const overBoard = d.moved && this.rectsOverlap(p.el.getBoundingClientRect(), this.board.getBoundingClientRect());
        this.flyToTray(p);
        if (d.fromPlaced && !d.moved) {
          this.audioSwoosh();
          this.updateStatus(`Lifted the ${p.color.name} piece back to the tray.`);
        } else if (overBoard) {
          this.audioOops(); // it doesn't fit there — gentle, not punitive
          this.updateStatus('That spot does not fit. The piece went back.');
        } else {
          this.audioSwoosh();
        }
      },

      onPointerCancel(e) {
        const d = this.drag;
        if (!d || e.pointerId !== d.pointerId) return;
        this.drag = null;
        this.clearGhost();
        this.flyToTray(d.p);
      },

      // Snap preview: where would the piece land if dropped right now?
      // Uses the logical drag pose (d.x/d.y), not getBoundingClientRect,
      // so the target is correct even while the pickup ease is running.
      // Forgiving: picks the nearest *fitting* cell within snapRange, so a
      // near-miss beside an occupied region still lands instead of failing.
      updateGhost() {
        this.clearGhost();
        const d = this.drag;
        if (!d) return;
        const brect = this.board.getBoundingClientRect();
        const cell = brect.width / this.N;
        const exactC = (d.x - brect.left) / cell;
        const exactR = (d.y - brect.top) / cell;
        const occ = this.occupancy();
        let best = null, bestDist = CONFIG.snapRange;
        for (let r = Math.round(exactR) - 1; r <= Math.round(exactR) + 1; r++) {
          for (let c = Math.round(exactC) - 1; c <= Math.round(exactC) + 1; c++) {
            if (!this.fits(d.p, r, c, occ)) continue;
            const dist = Math.hypot(r - exactR, c - exactC);
            if (dist < bestDist) { bestDist = dist; best = { r, c }; }
          }
        }
        d.target = best;
        if (best) this.highlightGhost(d.p, best.r, best.c);
      },

      highlightGhost(p, r, c) {
        p.cells.forEach(({ r: dr, c: dc }) => {
          this.cellEls[(r + dr) * this.N + (c + dc)].classList.add('ghost');
        });
      },

      clearGhost() {
        this.cellEls.forEach(el => el.classList.remove('ghost'));
      },

      rectsOverlap(a, b) {
        return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
      },

      /* ---------- keyboard interaction (parity with touch) ---------- */

      onPieceKey(e, p) {
        if (this.won || this.drag) return;
        const key = e.key;
        if (key === 'Enter' || key === ' ') {
          e.preventDefault();
          if (this.kb && this.kb.p === p) {
            const { r, c } = this.kb;
            if (this.fits(p, r, c, this.occupancy())) {
              this.endKb(false);
              this.placePiece(p, r, c);
            } else {
              this.audioOops();
              p.el.classList.remove('shake');
              void p.el.offsetWidth;
              p.el.classList.add('shake');
            }
          } else if (p.placed) {
            this.flyToTray(p);
            this.audioSwoosh();
            this.updateStatus(`Lifted the ${p.color.name} piece back to the tray.`);
          } else {
            this.startKb(p);
          }
        } else if (this.kb && this.kb.p === p && key.startsWith('Arrow')) {
          e.preventDefault();
          if (key === 'ArrowUp') this.kb.r--;
          if (key === 'ArrowDown') this.kb.r++;
          if (key === 'ArrowLeft') this.kb.c--;
          if (key === 'ArrowRight') this.kb.c++;
          this.kb.r = Math.max(0, Math.min(this.N - p.rows, this.kb.r));
          this.kb.c = Math.max(0, Math.min(this.N - p.cols, this.kb.c));
          this.positionKb();
        } else if (key === 'Escape' && this.kb && this.kb.p === p) {
          e.preventDefault();
          this.endKb(true);
        }
      },

      startKb(p) {
        const occ = this.occupancy();
        let spot = null;
        for (let r = 0; r <= this.N - p.rows && !spot; r++) {
          for (let c = 0; c <= this.N - p.cols && !spot; c++) {
            if (this.fits(p, r, c, occ)) spot = { r, c };
          }
        }
        if (!spot) spot = { r: 0, c: 0 };
        this.kb = { p, r: spot.r, c: spot.c };
        p.el.classList.remove('in-tray');
        p.el.classList.add('dragging');
        this.positionKb();
        this.audioPickup();
        this.updateStatus('Arrow keys move the piece. Enter places it. Escape puts it back.');
      },

      positionKb() {
        if (!this.kb) return;
        const { p, r, c } = this.kb;
        const brect = this.board.getBoundingClientRect();
        const cell = brect.width / this.N;
        p.el.style.left = (brect.left + c * cell) + 'px';
        p.el.style.top = (brect.top + r * cell) + 'px';
        this.clearGhost();
        if (this.fits(p, r, c, this.occupancy())) this.highlightGhost(p, r, c);
      },

      endKb(fly) {
        if (!this.kb) return;
        const p = this.kb.p;
        this.kb = null;
        this.clearGhost();
        if (fly) this.flyToTray(p);
      },

      /* ---------- win / settings ---------- */

      celebrate() {
        this.audioWin();
        this.updateStatus('The whole board is full. You did it!');
        this.renderWinEmojis();
        this.overlay.classList.add('show');
        Modal.open(this.overlay, () => this.newGame(true));
        for (let i = 0; i < 60; i++) {
          const conf = document.createElement('div');
          conf.className = 'confetti';
          conf.style.left = Math.random() * 100 + 'vw';
          conf.style.background = CONFIG.palette[Math.floor(Math.random() * CONFIG.palette.length)].fill;
          conf.style.width = (6 + Math.random() * 8) + 'px';
          conf.style.height = (6 + Math.random() * 8) + 'px';
          conf.style.animationDuration = (1.5 + Math.random() * 2) + 's';
          conf.style.animationDelay = (Math.random() * 0.8) + 's';
          document.body.appendChild(conf);
          setTimeout(() => conf.remove(), 4500);
        }
      },

      renderWinEmojis() {
        const row = document.getElementById('emoji-row');
        const set = this.emojiSets[Math.floor(Math.random() * this.emojiSets.length)];
        row.innerHTML = set.map(e => `<button>${e}</button>`).join('');
        // Poking a celebration emoji wiggles it and chirps — a tiny toy.
        row.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
          btn.classList.remove('wiggle');
          void btn.offsetWidth;
          btn.classList.add('wiggle');
          this.audioEmoji();
        }));
      },

      openSettings() {
        this.settingsOverlay.classList.add('show');
        this.updateSizeButtons();
        Modal.open(this.settingsOverlay, () => this.closeSettings());
      },

      closeSettings() {
        this.settingsOverlay.classList.remove('show');
        Modal.close();
      },

      setSize(size) {
        if (size === this.size) {
          this.closeSettings();
          return;
        }
        this.size = size;
        this.updateSizeButtons();
        // Close first so the re-deal is visible, never a silent reset
        // behind the overlay (design principle 9).
        this.closeSettings();
        this.newGame(true);
      },

      updateSizeButtons() {
        this.settingsOverlay.querySelectorAll('.size-btn').forEach(btn => {
          const active = btn.dataset.size === this.size;
          btn.classList.toggle('active', active);
          btn.setAttribute('aria-checked', active ? 'true' : 'false');
        });
      },

      shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      },

      updateStatus(msg) {
        this.status.textContent = msg;
      },

      /* ---------- PWA ---------- */

      setupPWA() {
        // The whole toybox is one PWA: a single shared manifest
        // (../manifest.webmanifest, linked in <head>) and one root-scoped
        // service worker. Browsers reject blob:/data: worker scripts and
        // file:// has no SW support, so register only over http(s).
        if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
          navigator.serviceWorker.register('../sw.js').then((root) => {
            // Drop any old per-game worker from before unification so the one
            // root worker controls this page (longest scope wins).
            navigator.serviceWorker.getRegistrations().then((regs) =>
              regs.forEach((r) => {
                if (r !== root && r.scope.startsWith(root.scope) && r.scope !== root.scope) r.unregister();
              })
            );
          }).catch(() => {});
        }
      },

      /* ---------- audio ---------- */

      ensureAudio() {
        if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
      },

      playTone({ type = 'sine', freq = 440, duration = 100, startGain = 0.0001, peakGain = 0.15 }) {
        this.ensureAudio();
        const ctx = this.audioCtx;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.setValueAtTime(startGain, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(peakGain, ctx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration / 1000);
        osc.connect(gain).connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + duration / 1000 + 0.02);
      },

      audioPickup() { this.playTone({ type: 'sine', freq: 660, duration: 60, peakGain: 0.1 }); },
      audioPlace() {
        this.playTone({ type: 'sine', freq: 540, duration: 80, peakGain: 0.16 });
        setTimeout(() => this.playTone({ type: 'sine', freq: 810, duration: 70, peakGain: 0.13 }), 70);
      },
      // Gentle "hmm", not a punitive buzz (design principle 3)
      audioOops() { this.playTone({ type: 'sine', freq: 240, duration: 160, peakGain: 0.1 }); },
      audioEmoji() {
        const freq = [523, 587, 659, 784, 880][Math.floor(Math.random() * 5)]; // pentatonic chirp
        this.playTone({ type: 'sine', freq, duration: 140, peakGain: 0.15 });
      },
      audioSwoosh() {
        this.ensureAudio();
        const ctx = this.audioCtx;
        const bufferSize = ctx.sampleRate * 0.1;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        const src = ctx.createBufferSource();
        src.buffer = buffer;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);
        src.connect(gain).connect(ctx.destination);
        src.start();
      },
      audioWin() {
        [523.25, 659.25, 783.99].forEach((freq, i) => {
          setTimeout(() => this.playTone({ type: 'sine', freq, duration: 220, peakGain: 0.18 }), i * 180);
        });
      }
    };

    App.init();
  </script>
</body>
</html>
