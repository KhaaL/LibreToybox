<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odd One Out</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>рҹӘҒ</text></svg>" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <meta name="theme-color" content="#E0A100" />
  <style>
    :root {
      --bg1: #FFFDF2;
      --bg2: #FFF3C4;
      --accent: #E0A100;
      --border: #EAD489;
      --text: #5A4A1E;
      --shadow: #E7D69A;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; }
    /* Own background on html stops the body gradient propagating into
       overscroll, where it would tile and show the wrong end of the gradient. */
    html { background: var(--bg1); }
    body {
      font-family: ui-rounded, 'Hiragino Maru Gothic ProN', Quicksand, Comfortaa, 'Arial Rounded MT Bold', 'Varela Round', Calibri, sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100%;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }

    header {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 6px;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .logo { display: flex; align-items: center; }
    .top-btns { display: flex; gap: 8px; }
    .top-btn {
      position: relative;
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 3px 0 var(--shadow);
      transition: transform .05s;
      min-width: 48px;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: inherit;
    }
    .top-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--shadow); }
    /* New Game requires a deliberate hold, not a quick tap, so an accidental
       tap can't silently wipe progress. */
    .hold-progress { position: absolute; inset: 5px; border-radius: 50%; pointer-events: none; opacity: 0; transition: opacity .1s; }
    .top-btn.holding .hold-progress { opacity: 1; }

    main { width: 100%; max-width: 420px; padding: 8px 16px 18px; display: flex; flex-direction: column; align-items: center; gap: 16px; }

    /* Visually hidden but available to screen readers (aria-live announcements
       still fire). Standard clip-based sr-only pattern. */
    .status { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); clip-path: inset(50%); white-space: nowrap; border: 0; }

    /* Progress pips вҖ” one per round in a set, filled as rounds are solved.
       Visual only (no numbers), design principle 1. */
    #pips { display: flex; gap: 10px; margin-top: 4px; }
    .pip {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--border);
      transition: background .2s, transform .2s;
    }
    .pip.filled { background: var(--accent); border-color: var(--accent); transform: scale(1.1); }

    /* The board is a grid of uniform tiles вҖ” same neutral background so the
       ONLY variable a child compares is the emoji's category, never color. */
    #board {
      width: 100%;
      display: grid;
      gap: 12px;
      justify-content: center;
    }
    .tile {
      aspect-ratio: 1 / 1;
      background: #fff;
      border: 3px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 4px 0 var(--shadow);
      font-size: clamp(2.4rem, 12vw, 3.4rem);
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      transition: transform .08s, box-shadow .08s, opacity .25s;
    }
    .tile:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--shadow); }
    .tile:focus-visible { outline: 4px solid var(--accent); outline-offset: -4px; }
    /* .deal is declared before .correct/.wrong on purpose: it shares their
       exact specificity (two classes each), and a tile can still be mid-deal
       when it's tapped. With equal specificity the LATER rule wins the
       "animation" property outright, so .correct/.wrong must come after
       .deal in source order to reliably override its pop-in the instant
       either class is added вҖ” not just once .deal's own animationend fires
       (see the JS-side .deal cleanup in renderBoard() for the belt-and-braces
       half of this fix). */
    @keyframes pop-in { 0% { transform: scale(0.4); opacity: 0; } 60% { transform: scale(1.12); opacity: 1; } 100% { transform: scale(1); } }
    .tile.deal { animation: pop-in .35s ease-out both; }
    .tile.correct { animation: pop .5s ease-out; }
    /* Wrong tap = shake + a red flash (the suite's shared "wrong" cue, e.g.
       Sudoku's .conflict) so it's unmissable but still non-punitive вҖ” the
       tile settles straight back to neutral (design principle 3). */
    .tile.wrong { animation: shake .4s ease, wrongFlash .5s ease; }
    /* When a correct pick resolves, the non-odd tiles gently fade back. */
    #board.resolved .tile:not(.correct) { opacity: 0.35; }

    @keyframes pop { 0% { transform: scale(1); } 45% { transform: scale(1.25); } 100% { transform: scale(1); } }
    @keyframes shake { 0%,100% { transform: translateX(0); } 15% { transform: translateX(-9px); } 30% { transform: translateX(9px); } 45% { transform: translateX(-7px); } 60% { transform: translateX(7px); } 75% { transform: translateX(-4px); } }
    @keyframes wrongFlash { 0%,100% { border-color: var(--border); background: #fff; } 20%,65% { border-color: #E53935; background: #FFCDD2; } }
    @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
    @keyframes wiggle { 0%, 100% { transform: rotate(0) scale(1); } 25% { transform: rotate(-12deg) scale(1.25); } 55% { transform: rotate(9deg) scale(1.12); } 80% { transform: rotate(-4deg) scale(1.04); } }

    .overlay {
      position: fixed; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; text-align: center; padding: 20px;
    }
    .overlay.show { display: flex; }
    #win-overlay { background: rgba(255,255,255,0.55); justify-content: flex-end; padding-bottom: 12vh; }
    #settings-overlay { background: rgba(255,255,255,0.92); }

    .emoji-row { font-size: 4.5rem; display: flex; gap: 18px; margin-bottom: 22px; }
    .emoji-row button { background: none; border: none; padding: 0; font: inherit; cursor: pointer; animation: pop-in .6s ease-out both; }
    .emoji-row button:nth-child(2) { animation-delay: .15s; }
    .emoji-row button:nth-child(3) { animation-delay: .3s; }
    .emoji-row button:focus-visible { outline: 3px solid var(--text); outline-offset: 2px; border-radius: 12px; }
    .emoji-row button.wiggle { animation: wiggle .5s ease; }

    /* Recap of the set's 5 odd-one emoji, echoing the board's own tile grid
       (same column count via CONFIG.sizes[size].cols) but muted/desaturated
       so it stays secondary to the bright celebration .emoji-row above it. */
    .odds-recap { display: grid; gap: 8px; justify-content: center; margin-bottom: 18px; }
    .recap-tile {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      background: rgba(255,255,255,0.5);
      border: 2px solid var(--border);
      border-radius: 10px;
      opacity: 0.6;
      filter: grayscale(35%);
    }

    .settings-card {
      background: #fff; border: 3px solid var(--border); border-radius: 18px;
      padding: 22px 26px; box-shadow: 0 10px 28px rgba(0,0,0,0.15);
      display: flex; flex-direction: column; align-items: center; gap: 14px; min-width: 260px;
    }
    .settings-card h2 { margin: 0; font-size: 2rem; }
    .size-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 18px; max-width: 200px; }
    .size-btn {
      width: 72px; height: 72px; border: 2px solid var(--border); border-radius: 16px;
      background: #fff; font-family: inherit; font-size: 1.7rem; cursor: pointer;
      box-shadow: 0 4px 0 var(--shadow); transition: transform .05s;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; color: var(--text);
    }
    .size-btn small { font-size: 0.72rem; }
    .size-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--shadow); }
    .size-btn.active { box-shadow: 0 0 0 4px var(--accent), 0 4px 0 var(--shadow); }

    .confetti { position: fixed; top: 0; left: 0; width: 10px; height: 10px; pointer-events: none; z-index: 101; animation: fall linear forwards; }
  </style>
</head>
<body>

        <button class="size-btn" data-size="easy"   role="radio" aria-label="Easiest, four tiles">рҹҗЈ<small>4</small></button>
        <button class="size-btn" data-size="medium" role="radio" aria-label="Easy, six tiles">рҹҗӨ<small>6</small></button>
        <button class="size-btn" data-size="hard"   role="radio" aria-label="Hard, nine tiles">рҹҗҘ<small>9</small></button>
        <button class="size-btn" data-size="expert" role="radio" aria-label="Hardest, nine tiles, tricky">рҹҰҒ<small>9</small></button>
      </div>
      <button class="top-btn" id="close-settings" aria-label="Close">вң•</button>
    </div>
  </div>

<script>
// Super-categories вҖ” mutually disjoint, each вүҘ8 members so any can be the
// majority group even on the 9-tile board.
const GROUPS = {
  animals:  ['рҹҗ¶','рҹҗұ','рҹҗ°','рҹҰҠ','рҹҗ»','рҹҗј','рҹҰҒ','рҹҗҜ','рҹҗ®','рҹҗ·','рҹҗө','рҹҗЁ','рҹҗӯ','рҹҗ№'],
  food:     ['рҹҚҺ','рҹҚҢ','рҹҚ“','рҹҚү','рҹҚҮ','рҹҚ‘','рҹҚ•','рҹҚ”','рҹҚҹ','рҹҚ©','рҹҚӘ','рҹ§Җ','рҹҢӯ','рҹҘ•'],
  vehicles: ['рҹҡ—','рҹҡҢ','рҹҡӮ','вңҲпёҸ','рҹҡҖ','рҹҡІ','рҹҡҒ','вӣө','рҹҡҡ','рҹҡ•','рҹҸҚпёҸ','рҹҡ“'],
  nature:   ['рҹҢё','рҹҢ»','рҹҢҲ','вӯҗ','рҹҢҷ','рҹҢө','рҹҚ„','рҹҢІ','рҹҢҠ','рҹ”Ҙ','вқ„пёҸ','рҹҢ·','рҹҚҒ','рҹҢҙ'],
  faces:    ['рҹҳҖ','рҹҳғ','рҹҳҚ','рҹҳҺ','рҹҘі','рҹҳў','рҹҳЎ','рҹҳҙ','рҹӨ”','рҹҳң','рҹҳҮ','рҹӨ©'],
  sports:   ['вҡҪ','рҹҸҖ','рҹҺҫ','рҹҸҲ','вҡҫ','рҹҸҗ','рҹҸ“','рҹҸё','рҹҘҠ','рҹҺұ','рҹҺі','рҹҸ’'],
};

// Sibling sub-categories for the subtle "hidden rule" tier. Each set used as
// a majority is вүҘ8 members and disjoint from its siblings under the same
// parent, so the odd one shares the parent but breaks the finer rule.
const SUBGROUPS = {
  animals: {
    land:  ['рҹҗ¶','рҹҗұ','рҹҗ°','рҹҰҠ','рҹҗ»','рҹҰҒ','рҹҗҜ','рҹҗ®','рҹҗ·','рҹҗө'],
    sea:   ['рҹҗҹ','рҹҗ ','рҹҗ¬','рҹҗі','рҹҰҲ','рҹҗҷ','рҹҰҖ','рҹҰ‘','рҹҗЎ','рҹҰӯ'],
    birds: ['рҹҗ”','рҹҗ§','рҹҰү','рҹҰҶ','рҹҰ…','рҹҰң','рҹҗҰ','рҹ•ҠпёҸ','рҹҰ©'],
    bugs:  ['рҹҗқ','рҹҗӣ','рҹҰӢ','рҹҗһ','рҹҗң','рҹҰ—','рҹ•·пёҸ','рҹҗҢ'],
  },
  food: {
    fruit:  ['рҹҚҺ','рҹҚҢ','рҹҚ“','рҹҚү','рҹҚҮ','рҹҚ‘','рҹҚҚ','рҹҘқ','рҹҚ’','рҹҘӯ'],
    veg:    ['рҹҘ•','рҹҢҪ','рҹҘҰ','рҹҚ…','рҹҘ”','рҹ§…','рҹ«‘','рҹҘ’','рҹҚҶ','рҹҘ¬'],
    sweets: ['рҹҚ©','рҹҚӘ','рҹҚ°','рҹ§Ғ','рҹҚ«','рҹҚ¬','рҹҚӯ','рҹҚҰ','рҹҺӮ','рҹҚ®'],
  },
  vehicles: {
    road:  ['рҹҡ—','рҹҡҢ','рҹҡ•','рҹҡҡ','рҹҸҚпёҸ','рҹҡІ','рҹҡ“','рҹҡ‘','рҹҡӣ','рҹӣ»'],
    air:   ['вңҲпёҸ','рҹҡҖ','рҹҡҒ','рҹӣё','рҹӘӮ','рҹҺҲ'],
    water: ['вӣө','рҹҡӨ','рҹҡў','вҡ“','рҹӣ¶','рҹҰә'],
  },
};

const CONFIG = {
  roundsPerSet: 5,
  advanceMs: 700,   // pause after a correct pick before the next round (gameId-guarded)
  wrongHoldMs: 500, // input lock while the reject shake/flash plays (matches wrongFlash's duration)
  sizes: {
    easy:   { tiles: 4, cols: 2, subtle: false },   // рҹҗЈ 2Г—2
    medium: { tiles: 6, cols: 3, subtle: false },   // рҹҗӨ 2Г—3  (default)
    hard:   { tiles: 9, cols: 3, subtle: false },   // рҹҗҘ 3Г—3
    expert: { tiles: 9, cols: 3, subtle: true }     // рҹҰҒ 3Г—3 sibling sub-categories
  },
  // Canonical LibreToybox pastel palette вҖ” used for confetti (design principle 11).
  palette: ['#F7A6B9','#F9C784','#FFE66D','#A8E6CF','#8ED3F4','#C3B4F7','#FFB3A0','#C8E88A']
};

// --- Shared modal a11y helper (copied into each game вҖ” the suite ships no
// bundler). Moves focus into an opened overlay, traps Tab within it, closes on
// Escape, and restores focus to the opener on close (design principle 8). ---
const Modal = {
  opener: null, overlay: null, onDismiss: null, handler: null,
  focusable(el) {
    return [...el.querySelectorAll('a[href], button:not([disabled]), input, select, textarea, [tabindex]:not([tabindex="-1"])')]
      .filter(n => n.getClientRects().length > 0);
  },
  open(overlay, onDismiss) {
    this.opener = document.activeElement;
    this.overlay = overlay;
    this.onDismiss = onDismiss || null;
    const items = this.focusable(overlay);
    (items[0] || overlay).focus({ preventScroll: true });
    this.handler = (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        if (this.onDismiss) this.onDismiss(); else this.close();
      } else if (e.key === 'Tab') {
        const f = this.focusable(overlay);
        if (!f.length) { e.preventDefault(); return; }
        const first = f[0], last = f[f.length - 1];
        if (e.shiftKey && (document.activeElement === first || !overlay.contains(document.activeElement))) {
          e.preventDefault(); last.focus();
        } else if (!e.shiftKey && (document.activeElement === last || !overlay.contains(document.activeElement))) {
          e.preventDefault(); first.focus();
        }
      }
    };
    document.addEventListener('keydown', this.handler, true);
  },
  close() {
    if (this.handler) document.removeEventListener('keydown', this.handler, true);
    this.handler = null;
    const opener = this.opener;
    this.opener = this.overlay = this.onDismiss = null;
    if (opener && opener.focus) opener.focus({ preventScroll: true });
  }
};

const App = {
  size: 'medium',
  tiles: [],          // current round's emoji, in display order
  oddIndex: -1,       // which tile is the odd one out
  solved: 0,          // rounds solved in the current set
  oddsFound: [],      // the odd-one emoji from each solved round this set, in solve order
  resolving: false,   // true during the pause between a correct pick and the next round
  rejecting: false,   // true while the wrong-tap shake/flash is playing вҖ” blocks tap-spam
  won: false,
  gameId: 0,
  audioCtx: null,

  emojiSets: [
    ['рҹҺү', 'рҹҢҹ', 'рҹҸҶ'],
    ['рҹҺҲ', 'рҹҢҲ', 'рҹҺҠ'],
    ['рҹҘі', 'вңЁ', 'рҹҚӯ']
  ],

  init() {
    this.cacheDOM();
    this.bindEvents();
    this.updateSizeButtons();
    this.newGame();
    this.setupPWA();
  },

  cacheDOM() {
    this.board = document.getElementById('board');
    this.pipsEl = document.getElementById('pips');
    this.status = document.getElementById('status');
    this.winOverlay = document.getElementById('win-overlay');
    this.newGameBtn = document.getElementById('new-game');
    this.playAgainBtn = document.getElementById('play-again');
    this.settingsOverlay = document.getElementById('settings-overlay');
    this.settingsBtn = document.getElementById('settings-btn');
    this.closeSettingsBtn = document.getElementById('close-settings');
  },

  bindEvents() {
    this.bindNewGameHold();
    this.playAgainBtn.addEventListener('click', () => this.newGame(true));
    this.settingsBtn.addEventListener('click', () => this.openSettings());
    this.closeSettingsBtn.addEventListener('click', () => this.closeSettings());
    this.settingsOverlay.addEventListener('click', (e) => {
      if (e.target === this.settingsOverlay) this.closeSettings();
    });
    this.settingsOverlay.querySelectorAll('.size-btn').forEach(btn => {
      btn.addEventListener('click', () => this.setSize(btn.dataset.size));
    });
    // One delegated handler covers mouse, touch, pen and keyboard (real
    // <button> tiles fire click on Enter/Space too вҖ” keyboard parity, DP8).
    this.board.addEventListener('click', (e) => {
      const tile = e.target.closest('.tile');
      if (tile) this.pickTile(parseInt(tile.dataset.index, 10));
    });
  },

  // New Game requires a deliberate hold, not a quick tap, so an accidental
  // tap can't silently wipe progress. A quick tap/keypress does nothing;
  // only a sustained HOLD_MS hold starts a fresh round.
  bindNewGameHold() {
    const HOLD_MS = 500;
    const btn = this.newGameBtn;
    const ring = btn.querySelector('.hold-progress');
    let timer = null, raf = null, startTime = null, startPt = null, active = false;

    const tick = () => {
      const pct = Math.min(100, ((performance.now() - startTime) / HOLD_MS) * 100);
      ring.style.background = `conic-gradient(rgba(224,161,0,0.85) ${pct}%, transparent ${pct}%)`;
      if (pct < 100) raf = requestAnimationFrame(tick);
    };
    const start = () => {
      if (active) return;
      active = true;
      startTime = performance.now();
      btn.classList.add('holding');
      tick();
      timer = setTimeout(() => {
        active = false;
        btn.classList.remove('holding');
        if (navigator.vibrate) navigator.vibrate(40);
        this.newGame(true);
      }, HOLD_MS);
    };
    const cancel = () => {
      if (!active) return;
      active = false;
      clearTimeout(timer);
      if (raf) cancelAnimationFrame(raf);
      btn.classList.remove('holding');
      ring.style.background = '';
    };

    btn.addEventListener('pointerdown', (e) => { startPt = { x: e.clientX, y: e.clientY }; start(); });
    btn.addEventListener('pointermove', (e) => {
      if (!active || !startPt) return;
      if (Math.hypot(e.clientX - startPt.x, e.clientY - startPt.y) > 10) cancel();
    });
    btn.addEventListener('pointerup', cancel);
    btn.addEventListener('pointercancel', cancel);
    btn.addEventListener('pointerleave', cancel);
    btn.addEventListener('keydown', (e) => {
      if ((e.key === 'Enter' || e.key === ' ') && !e.repeat) { e.preventDefault(); start(); }
    });
    btn.addEventListener('keyup', (e) => {
      if (e.key === 'Enter' || e.key === ' ') cancel();
    });
  },

  shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  },

  sample(arr, n) { return this.shuffle(arr).slice(0, n); },

  // Build one round. Disjoint groups guarantee exactly one tile from a
  // different group, so the answer is always single and unambiguous.
  generateRound() {
    const { tiles, subtle } = CONFIG.sizes[this.size];
    let majority, odd;

    if (subtle) {
      // Pick a family that has a sub-group large enough to be the majority
      // plus at least one other sibling to draw the odd one from.
      const families = Object.keys(SUBGROUPS).filter(f => {
        const subs = Object.values(SUBGROUPS[f]);
        return subs.filter(s => s.length >= tiles - 1).length >= 1 && subs.length >= 2;
      });
      const fam = SUBGROUPS[families[Math.floor(Math.random() * families.length)]];
      const keys = Object.keys(fam);
      const majKeys = this.shuffle(keys.filter(k => fam[k].length >= tiles - 1));
      const majKey = majKeys[0];
      const oddKey = this.shuffle(keys.filter(k => k !== majKey))[0];
      majority = this.sample(fam[majKey], tiles - 1);
      odd = this.sample(fam[oddKey], 1)[0];
    } else {
      const cats = Object.keys(GROUPS);
      const majCat = this.shuffle(cats.filter(c => GROUPS[c].length >= tiles - 1))[0];
      const oddCat = this.shuffle(cats.filter(c => c !== majCat))[0];
      majority = this.sample(GROUPS[majCat], tiles - 1);
      odd = this.sample(GROUPS[oddCat], 1)[0];
    }

    this.tiles = this.shuffle([...majority, odd]);
    this.oddIndex = this.tiles.indexOf(odd);
  },

  newGame(animated) {
    this.gameId++;
    this.won = false;
    this.solved = 0;
    this.oddsFound = [];
    this.resolving = false;
    this.rejecting = false;
    this.winOverlay.classList.remove('show');
    Modal.close();
    if (animated) this.audioSwoosh();
    this.renderPips();
    this.nextRound(animated);
  },

  nextRound(animated) {
    this.resolving = false;
    this.generateRound();
    this.renderBoard(animated);
    this.updateStatus('Which one is different?');
  },

  renderPips() {
    this.pipsEl.innerHTML = '';
    for (let i = 0; i < CONFIG.roundsPerSet; i++) {
      const pip = document.createElement('div');
      pip.className = 'pip' + (i < this.solved ? ' filled' : '');
      this.pipsEl.appendChild(pip);
    }
    this.pipsEl.setAttribute('aria-label', `${this.solved} of ${CONFIG.roundsPerSet} found`);
  },

  renderBoard(animated) {
    const { cols } = CONFIG.sizes[this.size];
    this.board.classList.remove('resolved');
    this.board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    this.board.innerHTML = '';
    this.tiles.forEach((emoji, i) => {
      const btn = document.createElement('button');
      btn.className = 'tile' + (animated ? ' deal' : '');
      btn.dataset.index = i;
      btn.textContent = emoji;
      btn.setAttribute('aria-label', 'Item ' + (i + 1));
      if (animated) {
        btn.style.animationDelay = (i * 45) + 'ms';
        // .deal and .wrong/.correct share the same CSS specificity (two
        // classes each); leaving .deal on the tile after its pop-in
        // finishes lets it silently win the "animation" property tie by
        // source order, so the reject/celebrate keyframes never actually
        // run. Strip it the moment its own animation is done.
        btn.addEventListener('animationend', () => btn.classList.remove('deal'), { once: true });
      }
      this.board.appendChild(btn);
    });
  },

  pickTile(i) {
    if (this.won || this.resolving || this.rejecting) return;

    const tile = this.board.querySelector(`.tile[data-index="${i}"]`);
    if (!tile) return;

    if (i === this.oddIndex) {
      // Correct вҖ” celebrate the tile, fade the rest, fill a pip, then advance.
      this.resolving = true;
      this.audioRight();
      tile.classList.add('correct');
      this.board.classList.add('resolved');
      this.solved++;
      this.oddsFound.push(this.tiles[this.oddIndex]);
      this.renderPips();
      this.updateStatus('Yes! That one is different.');

      const gen = this.gameId;
      setTimeout(() => {
        if (gen !== this.gameId) return;   // a new game replaced this round
        if (this.solved >= CONFIG.roundsPerSet) {
          this.celebrate();
        } else {
          this.nextRound(true);
        }
      }, CONFIG.advanceMs);
    } else {
      // Wrong вҖ” gentle "hmm" + a shake, a red flash, and a short buzz, no
      // penalty. Expected guessing, not a rule violation, so never the harsh
      // buzz sound (design principle 3); the tile settles back to neutral.
      // Input is locked for the animation's duration so rapid repeat-tapping
      // ("tap spam") can't sneak a pick in вҖ” on this tile or any other,
      // including the correct one вҖ” while the reject cue is still playing.
      this.rejecting = true;
      this.audioOops();
      if (navigator.vibrate) navigator.vibrate(60);
      tile.classList.remove('wrong');
      void tile.offsetWidth;   // reflow so the animation can re-run
      tile.classList.add('wrong');
      this.updateStatus('Not that one. Try again!');

      const gen = this.gameId;
      setTimeout(() => {
        if (gen !== this.gameId) return;   // a new game replaced this round
        this.rejecting = false;
      }, CONFIG.wrongHoldMs);
    }
  },

  celebrate() {
    this.won = true;
    this.audioWin();
    this.updateStatus('You found all of them! Hooray!');
    this.renderWinEmojis();
    this.renderOddsRecap();
    this.winOverlay.classList.add('show');
    Modal.open(this.winOverlay, () => this.newGame(true));
    for (let i = 0; i < 60; i++) {
      const conf = document.createElement('div');
      conf.className = 'confetti';
      conf.style.left = Math.random() * 100 + 'vw';
      conf.style.background = CONFIG.palette[Math.floor(Math.random() * CONFIG.palette.length)];
      conf.style.width = (6 + Math.random() * 8) + 'px';
      conf.style.height = (6 + Math.random() * 8) + 'px';
      conf.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      conf.style.animationDelay = (Math.random() * 0.8) + 's';
      document.body.appendChild(conf);
      setTimeout(() => conf.remove(), 4500);
    }
  },

  renderWinEmojis() {
    const row = document.getElementById('emoji-row');
    const set = this.emojiSets[Math.floor(Math.random() * this.emojiSets.length)];
    row.innerHTML = set.map(e => `<button>${e}</button>`).join('');
    // Poking a celebration emoji wiggles it and chirps вҖ” a tiny toy.
    row.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
      btn.classList.remove('wiggle');
      void btn.offsetWidth;
      btn.classList.add('wiggle');
      this.audioEmoji();
    }));
  },

  // Muted recap of the odd-one emoji found this set, laid out with the same
  // column count as that difficulty's own board вҖ” reusing the board's grid
  // shape is the simplest way to give the recap a tile-like read without any
  // new layout logic.
  renderOddsRecap() {
    const { cols } = CONFIG.sizes[this.size];
    const wrap = document.getElementById('odds-recap');
    wrap.style.gridTemplateColumns = `repeat(${Math.min(cols, this.oddsFound.length)}, 1fr)`;
    wrap.innerHTML = this.oddsFound.map(e => `<div class="recap-tile">${e}</div>`).join('');
  },

  openSettings() { this.settingsOverlay.classList.add('show'); this.updateSizeButtons(); Modal.open(this.settingsOverlay, () => this.closeSettings()); },
  closeSettings() { this.settingsOverlay.classList.remove('show'); Modal.close(); },

  setSize(size) {
    if (size === this.size) { this.closeSettings(); return; }
    this.size = size;
    this.updateSizeButtons();
    // Close first so the re-deal is visible, never a silent reset behind the
    // overlay (design principle 9).
    this.closeSettings();
    this.newGame(true);
  },

  updateSizeButtons() {
    this.settingsOverlay.querySelectorAll('.size-btn').forEach(btn => {
      const active = btn.dataset.size === this.size;
      btn.classList.toggle('active', active);
      btn.setAttribute('aria-checked', active ? 'true' : 'false');
    });
  },

  updateStatus(msg) { this.status.textContent = msg; },

  setupPWA() {
    // The whole toybox is one PWA: a single shared manifest
    // (../manifest.webmanifest, linked in <head>) and one root-scoped
    // service worker. Browsers reject blob:/data: worker scripts and
    // file:// has no SW support, so register only over http(s).
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      navigator.serviceWorker.register('../sw.js').then((root) => {
        // Drop any old per-game worker from before unification so the one
        // root worker controls this page (longest scope wins).
        navigator.serviceWorker.getRegistrations().then((regs) =>
          regs.forEach((r) => {
            if (r !== root && r.scope.startsWith(root.scope) && r.scope !== root.scope) r.unregister();
          })
        );
      }).catch(() => {});
    }
  },

  ensureAudio() {
    if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
  },

  playTone({ type = 'sine', freq = 440, duration = 100, startGain = 0.0001, peakGain = 0.15 }) {
    this.ensureAudio();
    const ctx = this.audioCtx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(startGain, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(peakGain, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration / 1000);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration / 1000 + 0.02);
  },

  audioRight() {
    // Rising two-note chime for a correct find.
    this.playTone({ type: 'sine', freq: 660, duration: 90, peakGain: 0.16 });
    setTimeout(() => this.playTone({ type: 'sine', freq: 990, duration: 110, peakGain: 0.14 }), 90);
  },

  // Gentle "hmm", not a punitive buzz (design principle 3).
  audioOops() { this.playTone({ type: 'sine', freq: 240, duration: 160, peakGain: 0.1 }); },

  audioEmoji() {
    const freq = [523, 587, 659, 784, 880][Math.floor(Math.random() * 5)]; // pentatonic chirp
    this.playTone({ type: 'sine', freq, duration: 140, peakGain: 0.15 });
  },

  audioSwoosh() {
    this.ensureAudio();
    const ctx = this.audioCtx;
    const bufferSize = ctx.sampleRate * 0.1;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);
    src.connect(gain).connect(ctx.destination);
    src.start();
  },

  audioWin() {
    [523.25, 659.25, 783.99].forEach((freq, i) => {   // C-E-G major arpeggio
      setTimeout(() => this.playTone({ type: 'sine', freq, duration: 220, peakGain: 0.18 }), i * 180);
    });
  }
};

App.init();
</script>
</body>
</html>
